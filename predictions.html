<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Prédictions</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MiEndo">
<meta name="theme-color" content="#FD8BAB">
<link rel="apple-touch-icon" href="assets/icone-192.png">
<script src="assets/preferences.js"></script>
<script src="assets/i18n.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;--blanc:#FFFFFF;
    --gris-texte:#828282;--gris-bordure:#E6E6E6;
    --rose:#FD8BAB;--rose-pale:rgba(253,139,171,.34);
    --gris-clair:#F5F5F5;
  }

  /* ---- préférences d'affichage : mode sombre + échelle de police ---- */
  html{ font-size:calc(16px * var(--echelle-police, 1)); }
  .mode-sombre{
    --noir:#F2F0EF;--blanc:#1C1B1E;
    --gris-texte:#A8A6AA;--gris-bordure:#3A383D;
  }
  .mode-sombre body{ background-color:#121113; }
  .mode-sombre img:not(.logo, .logo-haut, .photo-recette, [src*="icons/"]){ filter:brightness(.9); }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;color:var(--noir);
    min-height:100dvh;padding-bottom:40px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,.82)),
      url('assets/bg.jpg') center/cover no-repeat fixed;
  }
  .logo-haut{display:block;width:54px;margin:14px auto 4px;}
  .entete{display:grid;grid-template-columns:36px 1fr 36px;align-items:center;padding:0 16px;margin-bottom:16px;}
  .retour{background:none;border:none;cursor:pointer;font-size:22px;line-height:1;color:var(--noir);text-align:left;padding:4px;}
  .titre-page{font-family:'Katibeh',serif;font-size:38px;font-weight:400;text-align:center;line-height:.9;margin-top:8px;}
  .contenu{padding:0 14px;max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}

  .carte{
    background:rgba(255,255,255,.82);
    border-radius:14px;padding:14px 16px;
  }
  .carte h2{font-size:15px;font-weight:700;margin-bottom:4px;}
  .carte .sous-titre{font-size:12px;color:var(--gris-texte);margin-bottom:12px;}

  /* ---- jours de prédiction ---- */
  .jours{display:flex;flex-direction:column;gap:8px;}
  .jour-pred{
    border-radius:12px;
    padding:12px 14px;
    background:var(--gris-clair);
    display:flex;flex-direction:column;gap:6px;
  }
  .jour-pred.aujourd-hui{
    background:var(--rose-pale);
    border:1.5px solid var(--rose);
  }
  .jour-entete{display:flex;justify-content:space-between;align-items:center;}
  .jour-label{font-weight:700;font-size:13.5px;}
  .jour-phase{font-size:11px;color:var(--gris-texte);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .symptomes{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
  .symptome-tag{
    font-size:11.5px;padding:3px 9px;border-radius:999px;
    background:rgba(0,0,0,.07);color:var(--noir);
  }
  .symptome-tag.eleve{background:rgba(253,139,171,.35);font-weight:600;}
  .douleur-barre{
    height:5px;border-radius:999px;
    background:var(--gris-bordure);
    overflow:hidden;margin-top:4px;
  }
  .douleur-barre-remplie{
    height:100%;border-radius:999px;
    background:var(--rose);
    transition:width .4s ease;
  }
  .douleur-label{font-size:11px;color:var(--gris-texte);margin-top:2px;}

  /* ---- encart data insuffisante ---- */
  .encart-info{
    background:rgba(253,139,171,.12);
    border-radius:12px;padding:14px;
    font-size:13px;line-height:1.6;color:var(--gris-texte);
    text-align:center;
  }
  .encart-info strong{color:var(--noir);}

  /* ---- fiabilité ---- */
  .fiabilite{
    display:flex;align-items:center;gap:8px;
    font-size:12px;color:var(--gris-texte);
    margin-top:4px;
  }
  .fiabilite-barre{
    flex:1;height:4px;border-radius:999px;
    background:var(--gris-bordure);overflow:hidden;
  }
  .fiabilite-barre span{
    display:block;height:100%;border-radius:999px;
    background:var(--rose);
  }

  .note-methodo{
    font-size:11.5px;color:var(--gris-texte);
    line-height:1.55;text-align:center;
    padding:0 8px;
  }
</style>
</head>
<body>

<img class="logo-haut" src="assets/logo.png" alt="MiEndo">

<div class="entete">
  <button class="retour" aria-label="Retour" onclick="window.location.href='cycle.html'">‹</button>
  <h1 class="titre-page">Prédictions</h1>
  <span></span>
</div>

<div class="contenu" id="contenu">
  <div class="encart-info">Chargement de tes données…</div>
</div>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ==========================================================
     LOGIQUE DE PRÉDICTION

     Pour chaque jour des 7 prochains jours, on calcule :
     1. Le jour du cycle prévu
     2. La phase prévue
     3. La douleur moyenne historique pour ce jour du cycle
        (sur tous les cycles passés)
     4. Les symptômes les plus fréquents pour cette phase
     5. Un score de fiabilité basé sur le nombre de cycles d'historique

     On affiche aussi :
     - Un avertissement si moins de 2 cycles de données
     - La prédiction des prochaines règles
  ========================================================== */

  const JOURS_FR = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  const MOIS_FR  = ['jan', 'fév', 'mar', 'avr', 'mai', 'juin', 'juil', 'août', 'sep', 'oct', 'nov', 'déc'];

  function aMinuit(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
  function cleDate(d){
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }
  function joursEntre(a, b){ return Math.round((b - a) / 86400000); }

  function phasePourJour(j, L, P){
    const ov = L - 14;
    if (j <= P)      return 'Menstruelle';
    if (j < ov - 1)  return 'Folliculaire';
    if (j <= ov + 1) return 'Ovulatoire';
    return 'Lutéale';
  }

  const EMOJI_PHASE = {
    Menstruelle: '🩸', Folliculaire: '🌱', Ovulatoire: '⭐', Lutéale: '🌾'
  };

  // Champs de symptômes catégoriels dans le journal
  const CHAMPS_SYMPTOMES = [
    'douleurs', 'etatGeneral', 'etatEmotionnel', 'digestion',
    'transit', 'sommeilSymptomes', 'fringales', 'peau'
  ];

  auth.onAuthStateChanged(async user => {
    if (!user || user.isAnonymous){ window.location.href = 'index.html'; return; }

    const [docUser, snapJournal] = await Promise.all([
      db.collection('users').doc(user.uid).get(),
      db.collection('users').doc(user.uid).collection('journal').get()
    ]);

    const cycle = docUser.exists ? docUser.data() : {};
    const journal = {};
    snapJournal.forEach(d => journal[d.id] = d.data());

    afficherPredictions(cycle, journal);
  });

  function afficherPredictions(cycle, journal){
    const contenu = document.getElementById('contenu');

    if (!cycle.lastPeriodStart){
      contenu.innerHTML = `
        <div class="encart-info">
          <strong>Indique le début de tes règles</strong> sur l'écran Cycle pour que
          MiEndo puisse calculer tes prédictions 🌸
        </div>`;
      return;
    }

    const L = cycle.cycleLength || 28;
    const P = cycle.periodLength || 5;
    const debutRef = aMinuit(new Date(cycle.lastPeriodStart));
    const auj = aMinuit(new Date());
    const jourAuj = ((joursEntre(debutRef, auj) % L) + L) % L + 1;

    /* ---- compter le nombre de cycles d'historique ---- */
    const toutesLesEntrees = Object.keys(journal).sort();
    let nbCycles = 0;
    if (toutesLesEntrees.length > 0){
      const premierJour = aMinuit(new Date(toutesLesEntrees[0]));
      nbCycles = Math.max(1, Math.floor(joursEntre(premierJour, auj) / L));
    }

    /* ---- pour chaque jour du cycle (1 à L), calculer les moyennes historiques ---- */
    const statsParJourCycle = {}; // { jourDuCycle: { douleurs: [], symptomes: {} } }
    for (let j = 1; j <= L; j++){
      statsParJourCycle[j] = { douleurs: [], symptomes: {} };
    }

    Object.entries(journal).forEach(([date, v]) => {
      const d = aMinuit(new Date(date));
      const ecart = joursEntre(debutRef, d);
      if (ecart < 0) return;
      const jourCycle = ecart % L + 1;

      if (typeof v.douleur === 'number'){
        statsParJourCycle[jourCycle].douleurs.push(v.douleur);
      }
      CHAMPS_SYMPTOMES.forEach(champ => {
        (v[champ] || []).forEach(s => {
          statsParJourCycle[jourCycle].symptomes[s] =
            (statsParJourCycle[jourCycle].symptomes[s] || 0) + 1;
        });
      });
    });

    /* ---- construire les 7 prédictions (aujourd'hui + 6 jours) ---- */
    const predictions = [];
    for (let delta = 0; delta < 7; delta++){
      const datePred = new Date(auj); datePred.setDate(datePred.getDate() + delta);
      const jourCyclePred = ((jourAuj - 1 + delta) % L) + 1;
      const phase = phasePourJour(jourCyclePred, L, P);
      const stats = statsParJourCycle[jourCyclePred];

      const douleurMoy = stats.douleurs.length
        ? stats.douleurs.reduce((a,b) => a+b, 0) / stats.douleurs.length
        : null;

      // top 4 symptômes pour ce jour du cycle
      const topSymptomes = Object.entries(stats.symptomes)
        .sort((a,b) => b[1]-a[1])
        .slice(0, 4)
        .map(([nom, n]) => ({ nom, n, eleve: n >= 2 }));

      predictions.push({ date: datePred, jourCyclePred, phase, douleurMoy, topSymptomes, delta });
    }

    /* ---- score de fiabilité (0-100) ---- */
    const fiabilite = Math.min(100, Math.round((nbCycles / 3) * 100));

    /* ---- rendu HTML ---- */
    contenu.innerHTML = '';

    // encart si peu de données
    if (nbCycles < 2){
      const encart = document.createElement('div');
      encart.className = 'encart-info';
      encart.innerHTML = `<strong>Prédictions en cours d'apprentissage 🌱</strong><br>
        Tu as ${nbCycles} cycle${nbCycles > 1 ? 's' : ''} de données.
        Les prédictions s'affinent à partir de 3 cycles — continue à remplir ton Bilan
        quotidiennement pour des prévisions de plus en plus précises !`;
      contenu.appendChild(encart);
    }

    // carte principale : les 7 jours
    const carte = document.createElement('div');
    carte.className = 'carte';
    carte.innerHTML = `
      <h2>Les 7 prochains jours</h2>
      <p class="sous-titre">Basé sur ${nbCycles} cycle${nbCycles>1?'s':''} de ton historique</p>
      <div class="fiabilite">
        <span>Fiabilité</span>
        <div class="fiabilite-barre"><span style="width:${fiabilite}%"></span></div>
        <span>${fiabilite}%</span>
      </div>`;

    const joursDiv = document.createElement('div');
    joursDiv.className = 'jours';
    joursDiv.style.marginTop = '12px';

    predictions.forEach(pred => {
      const isAuj = pred.delta === 0;
      const joursLabel = isAuj ? 'Aujourd\'hui'
        : pred.delta === 1 ? 'Demain'
        : `${JOURS_FR[pred.date.getDay()]} ${pred.date.getDate()} ${MOIS_FR[pred.date.getMonth()]}`;

      const div = document.createElement('div');
      div.className = 'jour-pred' + (isAuj ? ' aujourd-hui' : '');

      let barreHTML = '';
      if (pred.douleurMoy !== null){
        const pct = Math.round(pred.douleurMoy * 10);
        barreHTML = `
          <div class="douleur-barre">
            <div class="douleur-barre-remplie" style="width:${pct}%"></div>
          </div>
          <div class="douleur-label">Douleur probable : ${pred.douleurMoy.toFixed(1)}/10</div>`;
      } else {
        barreHTML = `<div class="douleur-label" style="color:var(--gris-texte);">
          Pas encore assez de données pour ce jour du cycle</div>`;
      }

      let symptomesHTML = '';
      if (pred.topSymptomes.length){
        const tags = pred.topSymptomes
          .map(s => `<span class="symptome-tag${s.eleve ? ' eleve' : ''}">${s.nom}</span>`)
          .join('');
        symptomesHTML = `<div class="symptomes">${tags}</div>`;
      }

      div.innerHTML = `
        <div class="jour-entete">
          <span class="jour-label">${joursLabel}</span>
          <span class="jour-phase">${EMOJI_PHASE[pred.phase]} ${pred.phase} · J${pred.jourCyclePred}</span>
        </div>
        ${barreHTML}
        ${symptomesHTML}`;

      joursDiv.appendChild(div);
    });

    carte.appendChild(joursDiv);
    contenu.appendChild(carte);

    // encart méthodologie
    const note = document.createElement('p');
    note.className = 'note-methodo';
    note.innerHTML = `Ces prédictions sont calculées à partir de <strong>tes propres données</strong>
      historiques — pas des moyennes génériques. Elles s'améliorent automatiquement
      à chaque Bilan rempli. Ce ne sont pas des avis médicaux.`;
    contenu.appendChild(note);
  }

  if ('serviceWorker' in navigator && !(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())) navigator.serviceWorker.register('sw.js').catch(function(){});
  document.addEventListener('DOMContentLoaded', window.appliquerTraductions);
</script>
</body>
</html>
