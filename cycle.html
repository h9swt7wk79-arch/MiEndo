<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Cycle</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FD8BAB">
<link rel="apple-touch-icon" href="assets/icone-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MiEndo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;
    --blanc:#FFFFFF;
    --gris-texte:#828282;
    --gris-bordure:#E6E6E6;
    --gris-clair:#E0E0E0;
    --rose:#F285AB;          /* anneau */
    --rose-fonce:#E05C8F;    /* marqueur de progression */
    --rose-pale:#FCE4EC;     /* fond jours de règles + jour actuel */
    --rose-texte:#E0447C;    /* chiffre du jour actuel */
    --bleu-pale:#DCEAFB;     /* fond jours d'ovulation */
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;
    color:var(--noir);
    background:#FFF;
    min-height:100dvh;
    padding-bottom:88px; /* place pour la nav fixe */
  }
  /* ---- fond dégradé adouci sur la partie haute ---- */
  .haut{
    background:
      linear-gradient(to bottom, rgba(255,255,255,.55) 0%, rgba(255,255,255,.75) 70%, #FFF 100%),
      url('assets/bg.jpg') center top/cover no-repeat;
    padding:14px 16px 26px;
  }
  .logo-haut{
    display:block;
    width:54px;
    margin:0 auto 4px;
  }
  .entete{
    display:grid;
    grid-template-columns:36px 1fr 36px;
    align-items:center;
    margin-bottom:10px;
  }
  .retour{
    background:none;border:none;cursor:pointer;
    font-size:22px;line-height:1;color:var(--noir);
    text-align:left;padding:4px;
  }
  .titre-page{
    font-family:'Katibeh',serif;
    font-size:38px;
    font-weight:400;
    text-align:center;
    line-height:.9;
    margin-top:8px; /* Katibeh a beaucoup d'espace au-dessus, on compense */
  }
  /* ---- puces Règles / Bilan / alerte ---- */
  .puces{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:22px;
  }
  .puce{
    color:var(--noir);
    display:flex;align-items:center;gap:8px;
    background:var(--blanc);
    border:1px solid var(--gris-bordure);
    border-radius:12px;
    padding:9px 16px;
    font:inherit;font-weight:600;font-size:16px;
    cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .puce img{width:21px;height:21px;}
  .puce-icone{padding:9px 10px;}
  /* ---- anneau de cycle ---- */
  .anneau-zone{
    position:relative;
    width:min(320px, 78vw);
    margin:0 auto;
  }
  .anneau-zone svg{display:block;width:100%;height:auto;}
  .anneau-centre{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 14%;
  }
  .phase{
    font-family:'Katibeh',serif;
    font-size:44px;
    line-height:.82;
    padding-top:14px;
  }
  .sous-phase{
    color:var(--gris-texte);
    font-size:13px;
    margin-top:10px;
  }
  /* ---- calendrier ---- */
  /* ---- message reçu du/de la partenaire ---- */
  .message-partenaire{
    display:flex;align-items:flex-start;gap:10px;
    background:rgba(253,139,171,.15);
    border:1px solid var(--rose-pale);
    border-radius:14px;
    margin:14px 16px 0;
    padding:12px 14px;
  }
  .message-partenaire .emoji-message{font-size:18px;flex-shrink:0;}
  .message-partenaire p{flex:1;font-size:13px;line-height:1.5;color:var(--noir);}
  .message-partenaire .fermer-message{
    background:none;border:none;cursor:pointer;
    color:var(--gris-texte);font-size:16px;line-height:1;
    padding:2px 4px;flex-shrink:0;
  }

  .calendrier{
    background:var(--blanc);
    border-radius:18px 18px 0 0;
    box-shadow:0 -4px 16px rgba(0,0,0,.05);
    padding:14px 12px 8px;
    margin-top:18px;
  }
  .cal-entete{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 6px 8px;
  }
  .cal-mois{font-weight:600;font-size:15px;text-transform:capitalize;}
  .cal-nav{
    background:none;border:none;cursor:pointer;
    font-size:18px;color:var(--gris-texte);padding:4px 10px;
  }
  table.cal{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
  }
  .cal th{
    font-weight:600;font-size:13px;
    padding:8px 0;
    border-bottom:1px solid var(--gris-bordure);
  }
  .cal td{
    height:54px;
    text-align:center;
    vertical-align:top;
    border-bottom:1px solid #F2F2F2;
    font-size:14px;
    padding-top:8px;
    position:relative;
  }
  .cal td.hors-mois{color:#C4C4C4;}
  .jour-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:8px;
  }
  td.regles .jour-num{background:var(--rose-pale);}
  td.ovulation .jour-num{background:var(--bleu-pale);}
  td.aujourdhui .jour-num{
    background:var(--rose-pale);
    color:var(--rose-texte);
    font-weight:600;
  }
  .marqueurs{
    display:block;
    font-size:10px;
    line-height:1;
    margin-top:2px;
    letter-spacing:1px;
  }
  /* ---- fiche résumé d'un jour ---- */
  .voile{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.35);
    z-index:20;
  }
  .voile.visible{display:block;}
  .fiche-jour{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--blanc);
    border-radius:20px 20px 0 0;
    padding:18px 20px calc(20px + env(safe-area-inset-bottom));
    z-index:21;
    transform:translateY(105%);
    transition:transform .22s ease;
    max-height:75dvh;overflow-y:auto;
  }
  .fiche-jour.visible{transform:translateY(0);}
  .fiche-tete{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;
  }
  .fiche-date{font-weight:700;font-size:15px;text-transform:capitalize;color:var(--noir);}
  .fiche-fermer{
    background:none;border:none;cursor:pointer;
    font-size:21px;color:var(--gris-texte);padding:2px 8px;line-height:1;
  }
  .fiche-ligne{
    display:flex;gap:8px;
    font-size:13.5px;line-height:1.5;
    padding:5px 0;color:var(--noir);
    border-bottom:1px solid #F4F4F4;
  }
  .fiche-ligne:last-of-type{border-bottom:none;}
  .fiche-ligne .etiquette{color:var(--gris-texte);min-width:96px;flex-shrink:0;font-size:12.5px;padding-top:1px;}
  .fiche-vide{color:#B5B5B5;font-size:13px;padding:10px 0;}
  .fiche-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
  .fiche-btn{
    height:42px;border-radius:10px;border:none;cursor:pointer;
    font:inherit;font-weight:500;
  }
  .fiche-btn-noir{background:var(--noir);color:var(--blanc);}
  .fiche-btn-blanc{background:var(--blanc);color:#B3261E;border:1px solid var(--gris-bordure);}
  .fiche-btn:active{opacity:.85;}

  /* ---- barre de navigation ---- */
  .nav-bas{
    position:fixed;
    left:0;right:0;bottom:0;
    background:var(--blanc);
    border-top:1px solid var(--gris-bordure);
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-bas a{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:40px;
    border-radius:10px;
  }
  .nav-bas a:focus-visible{outline:2px solid var(--noir);}
  .nav-bas img{width:30px;height:30px;}
</style>
</head>
<body>

<div class="haut">
  <img class="logo-haut" src="assets/logo.png" alt="MiEndo">

  <div class="entete">
    <span></span>
    <h1 class="titre-page">Cycle</h1>
    <span></span>
  </div>

  <div class="puces">
    <button class="puce" id="puce-regles"><img src="assets/icons/goutte.svg" alt="">Règles</button>
    <button class="puce" id="puce-bilan"><img src="assets/icons/bilan.svg" alt="">Bilan</button>
    <button class="puce puce-icone" id="puce-alerte" aria-label="Signaler une douleur"><img src="assets/icons/alerte.svg" alt=""></button>
  </div>

  <!-- Anneau de progression du cycle -->
  <div class="anneau-zone">
    <svg viewBox="0 0 200 200" aria-hidden="true">
      <!-- piste (cycle complet) -->
      <circle cx="100" cy="100" r="86" fill="none" stroke="var(--rose-pale)" stroke-width="14"/>
      <!-- progression (rotation -90° pour démarrer en haut) -->
      <circle id="arc-progression" cx="100" cy="100" r="86" fill="none"
              stroke="var(--rose)" stroke-width="14" stroke-linecap="round"
              transform="rotate(-90 100 100)"
              stroke-dasharray="0 540.35"/>
      <!-- marqueur du jour actuel (donut) -->
      <g id="marqueur">
        <circle id="marqueur-ext" cx="100" cy="14" r="13" fill="var(--rose-fonce)"/>
        <circle id="marqueur-int" cx="100" cy="14" r="6" fill="var(--blanc)"/>
      </g>
    </svg>
    <div class="anneau-centre">
      <div class="phase" id="texte-phase">Phase —</div>
      <div class="sous-phase" id="texte-sous-phase">Chargement…</div>
    </div>
  </div>
</div>

<!-- Message reçu de l'espace partenaire -->
<div class="message-partenaire" id="message-partenaire" hidden>
  <span class="emoji-message">💌</span>

</div>

<section class="calendrier">
  <div class="cal-entete">
    <button class="cal-nav" id="mois-prec" aria-label="Mois précédent">‹</button>

    <button class="cal-nav" id="mois-suiv" aria-label="Mois suivant">›</button>

  <table class="cal" id="cal-table">
    <thead>
      <tr><th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th></tr>

    <tbody id="cal-corps"></tbody>

<!-- Navigation -->

<div class="voile" id="voile"></div>

  <div class="fiche-tete">
    <span class="fiche-date" id="fiche-date"></span>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ==========================================================
     MODÈLE DE DONNÉES FIRESTORE (adapte si le tien diffère)
     users/{uid} :
       lastPeriodStart : "2026-06-02"   (1er jour des dernières règles)
       cycleLength     : 28             (durée moyenne du cycle)
       periodLength    : 5              (durée des règles)
     users/{uid}/journal/{YYYY-MM-DD} :
       regles  : true                   (saignements ce jour)
       bilan   : true                   (bilan quotidien rempli)
       douleur : 0 à 10                 (EVA douleur)
     ========================================================== */

  // État neutre tant que l'utilisatrice n'a pas déclaré de règles
  let cycle = { lastPeriodStart: null, cycleLength: 28, periodLength: 5 };
  let journal = {}; // { "2026-06-10": {bilan:true, douleur:6, regles:false}, ... }

  let moisAffiche = new Date(); // mois courant du calendrier
  let uidCourant = null;

  auth.onAuthStateChanged(async (user) => {
    if (!user || user.isAnonymous) { window.location.href = 'index.html'; return; }
    uidCourant = user.uid;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) cycle = { ...cycle, ...doc.data() };

      const snap = await db.collection('users').doc(user.uid).collection('journal').get();
      snap.forEach(d => journal[d.id] = d.data());
    } catch (e) {
      console.warn('Lecture Firestore impossible, affichage des données de démo.', e);
    }
    toutAfficher();
    synchroniserPartage();
    afficherMessagePartenaire();
  });

  // tient l'espace partenaire à jour à chaque visite
  async function synchroniserPartage(){
    try {
      if (!cycle.codePartenaire || !cycle.lastPeriodStart) return;
      const e = etatCycle();
      const proch = new Date(); proch.setDate(proch.getDate() + e.resteAvantRegles);
      await db.collection('partage').doc(cycle.codePartenaire).set({
        phase: e.phase,
        jourCycle: e.jour,
        prochainesRegles: cleDate(proch),
        majLe: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    } catch(err){ console.warn('Partage non synchronisé', err); }
  }

  // affiche le dernier message envoyé par le/la partenaire, s'il n'a pas déjà été lu
  async function afficherMessagePartenaire(){
    try {
      if (!cycle.codePartenaire) return;
      const doc = await db.collection('partage').doc(cycle.codePartenaire).get();
      if (!doc.exists) return;
      const d = doc.data();
      if (!d.messagePartenaire) return;
      const dejaLu = localStorage.getItem('miendo_message_lu_' + cycle.codePartenaire);
      const horodatage = d.messagePartenaireLe ? String(d.messagePartenaireLe.seconds) : d.messagePartenaire;
      if (dejaLu === horodatage) return;

      document.getElementById('texte-message-partenaire').textContent = d.messagePartenaire;
      document.getElementById('message-partenaire').hidden = false;
      document.getElementById('fermer-message-partenaire').addEventListener('click', () => {
        localStorage.setItem('miendo_message_lu_' + cycle.codePartenaire, horodatage);
        document.getElementById('message-partenaire').hidden = true;
      }, { once: true });
    } catch(err){ console.warn('Message partenaire non chargé', err); }
  }

  /* ---------- calculs de cycle ---------- */
  function joursEntre(a, b){ return Math.round((b - a) / 86400000); }
  function aMinuit(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }

  function etatCycle(){
    const debut = aMinuit(new Date(cycle.lastPeriodStart));
    const auj = aMinuit(new Date());
    const L = cycle.cycleLength;
    // jour du cycle (1-indexé), modulo si plusieurs cycles écoulés
    const ecart = joursEntre(debut, auj);
    const jour = ((ecart % L) + L) % L + 1;
    const ovulation = L - 14; // J ovulation estimé (phase lutéale ~14 j)
    let phase;
    if (jour <= cycle.periodLength)        phase = "Phase menstruelle";
    else if (jour < ovulation - 1)         phase = "Phase folliculaire";
    else if (jour <= ovulation + 1)        phase = "Phase ovulatoire";
    else                                   phase = "Phase lutéale";
    const resteAvantRegles = L - jour + 1;
    return { jour, L, phase, resteAvantRegles, ovulation };
  }

  /* ---------- anneau ---------- */
  function afficherAnneau(){
    if (!cycle.lastPeriodStart){
      document.getElementById('arc-progression').setAttribute('stroke-dasharray', '0 540.35');
      document.getElementById('texte-phase').textContent = 'Ton cycle';
      document.getElementById('texte-sous-phase').textContent = 'Appuie sur « Règles » au premier jour';
      document.getElementById('marqueur').style.display = 'none';
      return;
    }
    document.getElementById('marqueur').style.display = '';
    const { jour, L, phase, resteAvantRegles } = etatCycle();
    const r = 86, circ = 2 * Math.PI * r; // ≈ 540.35
    const fraction = jour / L;
    document.getElementById('arc-progression')
      .setAttribute('stroke-dasharray', `${circ * fraction} ${circ}`);
    // position du marqueur (angle depuis le haut, sens horaire)
    const angle = fraction * 2 * Math.PI - Math.PI / 2;
    const cx = 100 + r * Math.cos(angle);
    const cy = 100 + r * Math.sin(angle);
    document.getElementById('marqueur-ext').setAttribute('cx', cx);
    document.getElementById('marqueur-ext').setAttribute('cy', cy);
    document.getElementById('marqueur-int').setAttribute('cx', cx);
    document.getElementById('marqueur-int').setAttribute('cy', cy);

    const emojis = {
      "Phase menstruelle": "🩸",
      "Phase folliculaire": "🌱",
      "Phase ovulatoire": "⭐",
      "Phase lutéale": "🌙"
    };
    document.getElementById('texte-phase').innerHTML =
      phase.replace(' ', '<br>') + ' ' + emojis[phase];
    document.getElementById('texte-sous-phase').textContent =
      resteAvantRegles > 1
        ? `Règles dans ${resteAvantRegles} jours environ`
        : `Règles imminentes`;
  }

  /* ---------- calendrier ---------- */
  function cleDate(d){
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  function estJourRegles(d){
    // jours loggés OU prédits depuis lastPeriodStart (récurrence du cycle)
    const j = journal[cleDate(d)];
    if (j && j.regles) return true;
    if (j && j.regles === false) return false; // retirées manuellement
    if (!cycle.lastPeriodStart) return false;
    const debut = aMinuit(new Date(cycle.lastPeriodStart));
    const ecart = joursEntre(debut, aMinuit(d));
    const pos = ((ecart % cycle.cycleLength) + cycle.cycleLength) % cycle.cycleLength;
    return ecart >= 0 && pos < cycle.periodLength;
  }

  function estJourOvulation(d){
    if (!cycle.lastPeriodStart) return false;
    const debut = aMinuit(new Date(cycle.lastPeriodStart));
    const ecart = joursEntre(debut, aMinuit(d));
    const pos = ((ecart % cycle.cycleLength) + cycle.cycleLength) % cycle.cycleLength + 1;
    const ov = cycle.cycleLength - 14;
    return ecart >= 0 && pos >= ov - 1 && pos <= ov + 1;
  }

  function afficherCalendrier(){
    const annee = moisAffiche.getFullYear();
    const mois = moisAffiche.getMonth();
    document.getElementById('cal-mois').textContent =
      moisAffiche.toLocaleDateString('fr-FR', { month:'long', year:'numeric' });

    const premierJour = new Date(annee, mois, 1);
    const decalage = premierJour.getDay(); // 0 = dimanche (la maquette commence dimanche)
    const corps = document.getElementById('cal-corps');
    corps.innerHTML = '';
    const auj = aMinuit(new Date());

    let d = new Date(annee, mois, 1 - decalage);
    for (let semaine = 0; semaine < 6; semaine++){
      // ne pas afficher une 6e ligne entièrement hors mois
      if (semaine === 5 && d.getMonth() !== mois) break;
      const tr = document.createElement('tr');
      for (let i = 0; i < 7; i++){
        const td = document.createElement('td');
        const horsMois = d.getMonth() !== mois;
        if (horsMois) td.classList.add('hors-mois');
        if (!horsMois){
          if (aMinuit(d).getTime() === auj.getTime()) td.classList.add('aujourdhui');
          else if (estJourRegles(d)) td.classList.add('regles');
          else if (estJourOvulation(d)) td.classList.add('ovulation');
        }
        let marqueurs = '';
        const j = journal[cleDate(d)];
        if (j && !horsMois){
          if (j.bilan) marqueurs += '✔️';
          if (typeof j.douleur === 'number' && j.douleur > 4) marqueurs += '💔';
        }
        td.innerHTML = `<span class="jour-num">${d.getDate()}</span>` +
                       (marqueurs ? `<span class="marqueurs">${marqueurs}</span>` : '');
        if (!horsMois){
          const dateCellule = new Date(d);
          td.style.cursor = 'pointer';
          td.addEventListener('click', () => ouvrirFiche(dateCellule));
        }
        tr.appendChild(td);
        d.setDate(d.getDate() + 1);
      }
      corps.appendChild(tr);
    }
  }

  document.getElementById('mois-prec').addEventListener('click', () => {
    moisAffiche.setMonth(moisAffiche.getMonth() - 1); afficherCalendrier();
  });
  document.getElementById('mois-suiv').addEventListener('click', () => {
    moisAffiche.setMonth(moisAffiche.getMonth() + 1); afficherCalendrier();
  });

  /* ---------- boutons d'action ---------- */
  // RÈGLES : démarre les règles aujourd'hui → durée par défaut 5 jours
  // (modifiable plus tard dans les paramètres via periodLength)
  document.getElementById('puce-regles').addEventListener('click', async () => {
    if (!uidCourant) return;
    const duree = cycle.periodLength || 5;
    if (!confirm(`Démarrer tes règles aujourd'hui ? (${duree} jours seront marqués, modifiable dans tes paramètres)`)) return;
    const auj = new Date();
    const cleAuj = cleDate(auj);
    cycle.lastPeriodStart = cleAuj;
    cycle.periodLength = duree;
    cycle.cycleLength = cycle.cycleLength || 28;
    await db.collection('users').doc(uidCourant).set({
      lastPeriodStart: cleAuj,
      periodLength: cycle.periodLength,
      cycleLength: cycle.cycleLength
    }, { merge: true });
    // marque aussi les jours dans le journal (utile pour les analyses)
    const lot = db.batch();
    for (let i = 0; i < duree; i++){
      const d = new Date(auj); d.setDate(d.getDate() + i);
      lot.set(db.collection('users').doc(uidCourant).collection('journal').doc(cleDate(d)),
              { regles: true }, { merge: true });
      journal[cleDate(d)] = { ...(journal[cleDate(d)] || {}), regles: true };
    }
    await lot.commit();

    // mise à jour de l'espace partenaire si un code existe
    try {
      if (cycle.codePartenaire){
        const e = etatCycle();
        const proch = new Date(); proch.setDate(proch.getDate() + cycle.cycleLength);
        await db.collection('partage').doc(cycle.codePartenaire).set({
          phase: e.phase,
          prochainesRegles: cleDate(proch),
          majLe: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      }
    } catch(err){ console.warn('Partage non mis à jour', err); }

    toutAfficher();
  });

  // BILAN : page de bilan quotidien
  document.getElementById('puce-bilan').addEventListener('click', () => {
    window.location.href = 'bilan.html';
  });

  // ALERTE : ouvre le mode SOS (respiration, réflexes, SMS d'urgence, crise express)
  document.getElementById('puce-alerte').addEventListener('click', () => {
    window.location.href = 'sos.html';
  });

  /* ---------- fiche résumé d'un jour ---------- */
  let dateFiche = null;

  const LIBELLES_FICHE = [
    ['bienetre',        'Bien-être'],
    ['etatEmotionnel',  'Émotions'],
    ['flux',            'Flux'],
    ['pertes',          'Pertes'],
    ['douleurs',        'Douleurs'],
    ['etatGeneral',     'État général'],
    ['digestion',       'Digestion'],
    ['transit',         'Transit'],
    ['fringales',       'Fringales'],
    ['urine',           'Urine'],
    ['vulveVagin',      'Vulve/vagin'],
    ['peau',            'Peau'],
    ['cheveux',         'Cheveux'],
    ['sommeilQualite',  'Sommeil'],
    ['stress',          'Stress'],
    ['libido',          'Libido'],
    ['rapport',         'Rapport'],
    ['medicaments',     'Médicaments'],
    ['complements',     'Compléments'],
    ['therapies',       'Thérapies'],
    ['dispositifs',     'Dispositifs'],
    ['sport',           'Sport'],
    ['fete',            'Fête/excès'],
    ['bonus',           'Auto-soins'],
    ['notes',           'Notes']
  ];

  function ouvrirFiche(d){
    dateFiche = new Date(d);
    const cle = cleDate(d);
    const entree = journal[cle] || {};

    document.getElementById('fiche-date').textContent =
      d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });

    const contenu = document.getElementById('fiche-contenu');
    contenu.innerHTML = '';
    const lignes = [];

    if (entree.regles) lignes.push(['Règles', 'Oui (enregistrées)' + (entree.flux ? ' — flux ' + entree.flux : '')]);
    else if (estJourRegles(d)) lignes.push(['Règles', 'Prévues (estimation du cycle)']);
    if (estJourOvulation(d)) lignes.push(['Ovulation', 'Fenêtre estimée']);
    if (typeof entree.douleur === 'number') lignes.push(['Douleur', entree.douleur + '/10']);
    if (typeof entree.sommeilDuree === 'number') lignes.push(['Durée sommeil', (entree.sommeilDuree >= 13 ? '13 h+' : entree.sommeilDuree + ' h')]);

    LIBELLES_FICHE.forEach(([champ, libelle]) => {
      if (champ === 'flux') return; // déjà dans la ligne Règles
      let v = entree[champ];
      if (v == null || (Array.isArray(v) && !v.length)) return;
      if (Array.isArray(v)) v = v.join(', ');
      lignes.push([libelle, v]);
    });

    if (!lignes.length){
      contenu.innerHTML = '<div class="fiche-vide">Aucune donnée enregistrée ce jour-là.</div>';
    } else {
      lignes.forEach(([etiquette, valeur]) => {
        const ligne = document.createElement('div');
        ligne.className = 'fiche-ligne';
        const e = document.createElement('span');
        e.className = 'etiquette';
        e.textContent = etiquette;
        const val = document.createElement('span');
        val.textContent = valeur;
        ligne.append(e, val);
        contenu.appendChild(ligne);
      });
    }

    // boutons de retrait des règles
    document.getElementById('fiche-retirer-regles').hidden = !entree.regles;
    document.getElementById('fiche-annuler-debut').hidden = (cle !== cycle.lastPeriodStart);

    document.getElementById('voile').classList.add('visible');
    document.getElementById('fiche-jour').classList.add('visible');
  }

  function fermerFiche(){
    document.getElementById('voile').classList.remove('visible');
    document.getElementById('fiche-jour').classList.remove('visible');
  }
  document.getElementById('voile').addEventListener('click', fermerFiche);
  document.getElementById('fiche-fermer').addEventListener('click', fermerFiche);

  document.getElementById('fiche-bilan').addEventListener('click', () => {
    window.location.href = 'bilan.html?date=' + cleDate(dateFiche);
  });

  // retirer les règles d'UN jour (erreur de saisie ponctuelle)
  document.getElementById('fiche-retirer-regles').addEventListener('click', async () => {
    if (!uidCourant || !dateFiche) return;
    const cle = cleDate(dateFiche);
    await db.collection('users').doc(uidCourant).collection('journal').doc(cle)
      .set({ regles: false, flux: firebase.firestore.FieldValue.delete() }, { merge: true });
    if (journal[cle]) { journal[cle].regles = false; delete journal[cle].flux; }
    fermerFiche();
    toutAfficher();
  });

  // annuler tout le départ de règles déclenché par erreur
  document.getElementById('fiche-annuler-debut').addEventListener('click', async () => {
    if (!uidCourant || !cycle.lastPeriodStart) return;
    if (!confirm('Annuler ce début de règles ? Les jours marqués seront retirés et les prédictions recalculées.')) return;
    const debut = new Date(cycle.lastPeriodStart);
    const duree = cycle.periodLength || 5;
    const lot = db.batch();
    for (let i = 0; i < duree; i++){
      const d = new Date(debut); d.setDate(d.getDate() + i);
      const cle = cleDate(d);
      lot.set(db.collection('users').doc(uidCourant).collection('journal').doc(cle),
              { regles: false }, { merge: true });
      if (journal[cle]) journal[cle].regles = false;
    }
    lot.set(db.collection('users').doc(uidCourant),
            { lastPeriodStart: firebase.firestore.FieldValue.delete() }, { merge: true });
    await lot.commit();
    cycle.lastPeriodStart = null;
    fermerFiche();
    toutAfficher();
  });

  function toutAfficher(){ afficherAnneau(); afficherCalendrier(); }
  // premier rendu immédiat (état neutre, le temps que Firestore réponde)
  toutAfficher();
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
