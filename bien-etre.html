<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Bien-être</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;
    --blanc:#FFFFFF;
    --gris-texte:#828282;
    --gris-bordure:#E6E6E6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;
    color:var(--noir);
    min-height:100dvh;
    padding-bottom:88px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.55), rgba(255,255,255,.72)),
      url('assets/bg.jpg') center/cover no-repeat fixed;
  }
  .logo-haut{display:block;width:54px;margin:14px auto 4px;}
  .entete{
    display:grid;grid-template-columns:36px 1fr 36px;
    align-items:center;padding:0 16px;margin-bottom:16px;
  }
  .retour{
    background:none;border:none;cursor:pointer;
    font-size:22px;line-height:1;color:var(--noir);
    text-align:left;padding:4px;
  }
  .titre-page{
    font-family:'Katibeh',serif;
    font-size:38px;font-weight:400;
    text-align:center;line-height:.9;margin-top:8px;
  }
  .cartes{padding:0 12px;display:flex;flex-direction:column;gap:16px;}
  .carte{
    border:none;
    border-radius:14px;
    padding:0;
    text-align:left;
    cursor:pointer;
    font:inherit;
    overflow:hidden;
    width:100%;
  }
  .carte-tete{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:18px 16px;
    min-height:96px;
  }
  .carte h2{font-size:19px;font-weight:700;}
  .carte .emoji{font-size:19px;}
  .carte-contenu{
    display:none;
    background:rgba(255,255,255,.72);
    padding:14px 16px;
  }
  .carte.ouverte .carte-contenu{display:block;}
  .carte-contenu p{
    font-size:13.5px;
    line-height:1.55;
    margin-bottom:9px;
  }
  .carte-contenu p:last-child{margin-bottom:0;}
  /* teintes pastel translucides, posées sur le dégradé */
  .sport{background:rgba(251,215,192,.66);}
  .alimentation{background:rgba(219,238,210,.66);}
  .sommeil{background:rgba(213,230,250,.66);}
  .eviter{background:rgba(250,202,210,.72);}
  .avertissement{
    color:var(--gris-texte);
    font-size:11.5px;
    text-align:center;
    padding:18px 24px 0;
  }
  .nav-bas{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--blanc);
    border-top:1px solid var(--gris-bordure);
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-bas a{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:40px;border-radius:10px;
  }
  .nav-bas a:focus-visible{outline:2px solid var(--noir);}
  .nav-bas img{width:30px;height:30px;}
</style>
</head>
<body>

<img class="logo-haut" src="assets/logo.png" alt="MiEndo">

<div class="entete">
  <button class="retour" aria-label="Retour" onclick="history.back()">‹</button>
  <h1 class="titre-page">Bien-être</h1>
  <span></span>
</div>

<div class="cartes">

  <button class="carte sport" aria-expanded="false">
    <div class="carte-tete"><h2>Sport</h2><span class="emoji">🏃‍♀️</span></div>
    <div class="carte-contenu">
      <p>Une activité douce et régulière (marche, natation, yoga, vélo tranquille) aide souvent à mieux vivre les douleurs : bouger un peu chaque jour compte plus qu'une grosse séance par semaine.</p>
      <p>Adapte l'intensité à ta phase de cycle et à ta fatigue du jour — les jours difficiles, quelques étirements ou une courte marche suffisent.</p>
      <p>Le maître-mot : écouter ton corps. Si une activité aggrave systématiquement tes douleurs, note-le dans ton bilan pour en parler à ton médecin.</p>
    </div>
  </button>

  <button class="carte alimentation" aria-expanded="false">
    <div class="carte-tete"><h2>Alimentation</h2><span class="emoji">🥗</span></div>
    <div class="carte-contenu">
      <p>Privilégie les fruits, légumes, légumineuses, céréales complètes et sources d'oméga-3 (poissons gras, noix, huile de colza), et pense à bien t'hydrater au fil de la journée.</p>
      <p>Chacune réagit différemment : ton journal Repas croisé avec tes bilans de douleur (onglet Analyses) t'aidera à repérer <em>tes</em> propres aliments sensibles, plutôt que de suivre des interdits généraux.</p>
      <p>Évite les régimes d'exclusion stricts sans accompagnement : un suivi par un·e diététicien·ne est préférable si tu envisages de gros changements.</p>
    </div>
  </button>

  <button class="carte sommeil" aria-expanded="false">
    <div class="carte-tete"><h2>Sommeil</h2><span class="emoji">🌙</span></div>
    <div class="carte-contenu">
      <p>Le manque de sommeil amplifie la perception de la douleur. Vise des horaires réguliers de coucher et de lever, même le week-end.</p>
      <p>Une routine apaisante aide : lumière tamisée le soir, écrans coupés 30 à 60 minutes avant le coucher, chambre fraîche et sombre.</p>
      <p>Les jours de fortes douleurs, une sieste courte (20 minutes) peut aider sans dérégler la nuit suivante.</p>
    </div>
  </button>

  <button class="carte eviter" aria-expanded="false">
    <div class="carte-tete"><h2>À éviter</h2><span class="emoji">🚨</span></div>
    <div class="carte-contenu">
      <p>Le tabac et l'alcool ont tendance à entretenir l'inflammation et à perturber le sommeil ; les limiter est l'un des gestes les plus utiles.</p>
      <p>Attention à l'excès de caféine, surtout en deuxième partie de journée, et aux longues périodes assise sans bouger.</p>
      <p>Évite l'automédication prolongée (notamment les anti-inflammatoires sur de longues durées) sans avis médical, et ne banalise pas une douleur qui change ou s'intensifie : c'est un motif de consultation.</p>
    </div>
  </button>

</div>

<p class="avertissement">Ces conseils sont généraux et ne remplacent pas l'avis de ton médecin ou de ton équipe de soins.</p>

<nav class="nav-bas">
  <a href="cycle.html" aria-label="Cycle"><img src="assets/icons/lune.svg" alt=""></a>
  <a href="repas.html" aria-label="Repas"><img src="assets/icons/poids.svg" alt=""></a>
  <a href="rendez-vous.html" aria-label="Rendez-vous"><img src="assets/icons/calendrier.svg" alt=""></a>
  <a href="analyses.html" aria-label="Analyses"><img src="assets/icons/stats.svg" alt=""></a>
  <a href="bien-etre.html" aria-current="page" aria-label="Conseils bien-être"><img src="assets/icons/feuille.svg" alt=""></a>
  <a href="profil.html" aria-label="Profil"><img src="assets/icons/profil.svg" alt=""></a>
</nav>

<script>
  // cartes dépliables
  document.querySelectorAll('.carte').forEach(carte => {
    carte.addEventListener('click', () => {
      const ouverte = carte.classList.toggle('ouverte');
      carte.setAttribute('aria-expanded', ouverte);
    });
  });
</script>
</body>
</html>
