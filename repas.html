<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Repas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;
    --blanc:#FFFFFF;
    --gris-texte:#828282;
    --gris-bordure:#E6E6E6;
    --gris-clair:#E0E0E0;
    --gris-fonce:#1A1A1A;
    --rose:#F285AB;
    --rose-pale:#FCE4EC;
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;
    color:var(--noir);
    min-height:100dvh;
    padding-bottom:88px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,.78)),
      url('assets/bg.jpg') center/cover no-repeat fixed;
  }
  .logo-haut{display:block;width:54px;margin:14px auto 4px;}
  .entete{
    display:grid;
    grid-template-columns:36px 1fr 36px;
    align-items:center;
    padding:0 16px;
    margin-bottom:6px;
  }
  .retour{
    background:none;border:none;cursor:pointer;
    font-size:22px;line-height:1;color:var(--noir);
    text-align:left;padding:4px;
  }
  .titre-page{
    font-family:'Katibeh',serif;
    font-size:38px;font-weight:400;
    text-align:center;line-height:.9;margin-top:8px;
  }
  /* ---- date du jour ---- */
  .date-nav{
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin-bottom:10px;
    color:var(--gris-fonce);
  }
  .date-nav button{
    background:none;border:none;cursor:pointer;
    font-size:17px;color:var(--gris-texte);padding:2px 10px;
  }
  .date-nav span{font-weight:600;font-size:13px;text-transform:capitalize;}
  /* ---- barre d'ajout ---- */
  .zone-ajout{padding:0 16px;}
  .barre-recherche{
    display:flex;align-items:center;gap:10px;
    background:var(--blanc);
    border-radius:14px;
    padding:13px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .barre-recherche svg{flex-shrink:0;}
  .barre-recherche input{
    flex:1;border:none;outline:none;font:inherit;font-weight:500;
    background:transparent;min-width:0;
  }
  .barre-recherche input::placeholder{color:var(--gris-texte);font-weight:400;}
  .crayon{background:none;border:none;cursor:pointer;padding:2px;display:flex;}
  /* ---- formulaire quantité/repas (apparaît à la saisie) ---- */
  .form-aliment{
    display:none;
    background:var(--blanc);
    border-radius:14px;
    margin-top:10px;
    padding:14px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .form-aliment.visible{display:block;}
  .ligne-form{display:flex;gap:10px;margin-bottom:10px;}
  .ligne-form > *{flex:1;}
  .form-aliment input,.form-aliment select{
    height:40px;
    border:1px solid var(--gris-bordure);
    border-radius:var(--radius);
    padding:0 12px;
    font:inherit;
    background:var(--blanc);
    width:100%;
    outline:none;
  }
  .form-aliment input:focus,.form-aliment select:focus{border-color:var(--gris-texte);}
  .btn-valider{
    width:100%;height:42px;
    background:var(--noir);color:var(--blanc);
    border:none;border-radius:var(--radius);
    font:inherit;font-weight:500;cursor:pointer;
  }
  .btn-valider:active{opacity:.8;}
  /* ---- filtres ---- */
  .filtres{display:flex;gap:8px;padding:12px 16px 4px;}
  .filtres select{
    appearance:none;
    background:var(--blanc) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23828282' fill='none' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 12px center;
    border:1px solid var(--gris-bordure);
    border-radius:var(--radius);
    padding:7px 30px 7px 12px;
    font:inherit;font-size:13px;
    cursor:pointer;outline:none;
  }
  /* ---- sections repas ---- */
  .repas-liste{padding:12px 16px 0;}
  .section-repas{border-bottom:1px solid var(--gris-clair);padding:13px 2px;}
  .section-titre{
    display:flex;justify-content:space-between;align-items:center;
    font-size:13.5px;font-weight:500;
  }
  .section-compte{color:var(--gris-texte);font-size:12px;font-weight:400;}
  .aliments{margin-top:6px;}
  .aliment{
    display:flex;align-items:center;justify-content:space-between;
    padding:7px 4px 7px 12px;
    font-size:13.5px;
  }
  .aliment-nom{flex:1;}
  .aliment-qte{color:var(--gris-texte);font-size:12.5px;margin-right:8px;white-space:nowrap;}
  .aliment-suppr{
    background:none;border:none;cursor:pointer;
    color:var(--gris-texte);font-size:16px;line-height:1;
    padding:2px 6px;border-radius:6px;
  }
  .aliment-suppr:hover{color:var(--noir);background:var(--rose-pale);}
  .vide{color:#C4C4C4;font-size:12.5px;padding:4px 12px;}
  /* ---- navigation ---- */
  .nav-bas{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--blanc);
    border-top:1px solid var(--gris-bordure);
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-bas a{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:40px;border-radius:10px;
  }
  .nav-bas a:focus-visible{outline:2px solid var(--noir);}
  .nav-bas img{width:30px;height:30px;}
</style>
</head>
<body>

<img class="logo-haut" src="assets/logo.png" alt="MiEndo">

<div class="entete">
  <button class="retour" aria-label="Retour" onclick="history.back()">‹</button>
  <h1 class="titre-page">Repas</h1>
  <span></span>
</div>

<div class="date-nav">
  <button id="jour-prec" aria-label="Jour précédent">‹</button>
  <span id="date-affichee"></span>
  <button id="jour-suiv" aria-label="Jour suivant">›</button>
</div>

<div class="zone-ajout">
  <div class="barre-recherche">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="7" stroke="black" stroke-width="2"/>
      <path d="M20 20l-3.5-3.5" stroke="black" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input type="text" id="champ-aliment" placeholder="Ajouter un aliment..." autocomplete="off">
    <button class="crayon" id="btn-crayon" aria-label="Saisir les détails">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3z" stroke="black" stroke-width="2" stroke-linejoin="round"/>
        <path d="M13.5 6.5l3 3" stroke="black" stroke-width="2"/>
      </svg>
    </button>
  </div>

  <div class="form-aliment" id="form-aliment">
    <div class="ligne-form">
      <input type="number" id="champ-quantite" placeholder="Quantité" min="0" step="any" inputmode="decimal">
      <select id="champ-unite">
        <option value="g">g</option>
        <option value="ml">ml</option>
        <option value="portion">portion(s)</option>
        <option value="piece">pièce(s)</option>
        <option value="cas">c. à soupe</option>
        <option value="cac">c. à café</option>
        <option value="tasse">tasse(s)</option>
      </select>
    </div>
    <div class="ligne-form">
      <select id="champ-repas">
        <option value="petit_dejeuner">Petit déjeuner</option>
        <option value="dejeuner">Déjeuner</option>
        <option value="en_cas">En cas</option>
        <option value="diner">Diner</option>
      </select>
    </div>
    <button class="btn-valider" id="btn-ajouter">Ajouter</button>
  </div>
</div>

<div class="filtres">
  <select id="filtre">
    <option value="tous">Filter</option>
    <option value="petit_dejeuner">Petit déjeuner</option>
    <option value="dejeuner">Déjeuner</option>
    <option value="en_cas">En cas</option>
    <option value="diner">Diner</option>
  </select>
  <select id="tri">
    <option value="ajout">Sort</option>
    <option value="alpha">A → Z</option>
    <option value="quantite">Quantité</option>
  </select>
</div>

<div class="repas-liste" id="repas-liste"></div>

<nav class="nav-bas">
  <a href="cycle.html" aria-label="Cycle"><img src="assets/icons/lune.svg" alt=""></a>
  <a href="repas.html" aria-current="page" aria-label="Repas"><img src="assets/icons/poids.svg" alt=""></a>
  <a href="rendez-vous.html" aria-label="Rendez-vous"><img src="assets/icons/calendrier.svg" alt=""></a>
  <a href="analyses.html" aria-label="Analyses"><img src="assets/icons/stats.svg" alt=""></a>
  <a href="#" aria-label="Conseils bien-être"><img src="assets/icons/feuille.svg" alt=""></a>
  <a href="#" aria-label="Profil"><img src="assets/icons/profil.svg" alt=""></a>
</nav>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ==========================================================
     MODÈLE : users/{uid}/aliments/{autoId}
       date     : "2026-06-12"
       repas    : "petit_dejeuner" | "dejeuner" | "en_cas" | "diner"
       nom      : "Flocons d'avoine"
       quantite : 60
       unite    : "g"
       creeLe   : timestamp
     → requêtable par date pour les analyses (corrélations
       alimentation / douleur / cycle plus tard)
     ========================================================== */

  const REPAS = [
    { cle:'petit_dejeuner', label:'Petit déjeuner' },
    { cle:'dejeuner',       label:'Déjeuner' },
    { cle:'en_cas',         label:'En cas' },
    { cle:'diner',          label:'Diner' }
  ];

  let uid = null;
  let dateCourante = new Date();
  let items = []; // aliments du jour affiché

  const champAliment = document.getElementById('champ-aliment');
  const formAliment  = document.getElementById('form-aliment');

  function cleDate(d){
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  function afficherDate(){
    const auj = cleDate(new Date()) === cleDate(dateCourante);
    document.getElementById('date-affichee').textContent = auj
      ? "Aujourd'hui"
      : dateCourante.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'long' });
  }

  /* ---------- lecture ---------- */
  async function chargerJour(){
    if (!uid) return;
    const snap = await db.collection('users').doc(uid).collection('aliments')
      .where('date', '==', cleDate(dateCourante)).get();
    items = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    afficherListe();
  }

  /* ---------- affichage ---------- */
  const UNITES = { g:'g', ml:'ml', portion:'portion(s)', piece:'pièce(s)', cas:'c. à s.', cac:'c. à c.', tasse:'tasse(s)' };

  function afficherListe(){
    const filtre = document.getElementById('filtre').value;
    const tri = document.getElementById('tri').value;
    const conteneur = document.getElementById('repas-liste');
    conteneur.innerHTML = '';

    let visibles = REPAS.filter(r => filtre === 'tous' || r.cle === filtre);

    visibles.forEach(r => {
      let liste = items.filter(i => i.repas === r.cle);
      if (tri === 'alpha') liste.sort((a,b) => a.nom.localeCompare(b.nom));
      else if (tri === 'quantite') liste.sort((a,b) => (b.quantite||0) - (a.quantite||0));
      else liste.sort((a,b) => (a.creeLe?.seconds||0) - (b.creeLe?.seconds||0));

      const sec = document.createElement('div');
      sec.className = 'section-repas';
      sec.innerHTML = `<div class="section-titre">${r.label}
        <span class="section-compte">${liste.length ? liste.length + ' aliment' + (liste.length>1?'s':'') : ''}</span></div>`;

      const zone = document.createElement('div');
      zone.className = 'aliments';
      if (!liste.length){
        zone.innerHTML = '<div class="vide">Rien d\u2019ajouté</div>';
      } else {
        liste.forEach(i => {
          const ligne = document.createElement('div');
          ligne.className = 'aliment';
          const qte = i.quantite ? `${i.quantite} ${UNITES[i.unite] || i.unite || ''}` : '';
          ligne.innerHTML = `<span class="aliment-nom"></span>
            <span class="aliment-qte">${qte}</span>
            <button class="aliment-suppr" aria-label="Supprimer">×</button>`;
          ligne.querySelector('.aliment-nom').textContent = i.nom;
          ligne.querySelector('.aliment-suppr').addEventListener('click', () => supprimer(i.id));
          zone.appendChild(ligne);
        });
      }
      sec.appendChild(zone);
      conteneur.appendChild(sec);
    });
  }

  /* ---------- ajout / suppression ---------- */
  function ouvrirForm(){
    if (champAliment.value.trim()) formAliment.classList.add('visible');
  }
  champAliment.addEventListener('input', ouvrirForm);
  champAliment.addEventListener('keydown', e => { if (e.key === 'Enter') ouvrirForm(); });
  document.getElementById('btn-crayon').addEventListener('click', ouvrirForm);

  document.getElementById('btn-ajouter').addEventListener('click', async () => {
    const nom = champAliment.value.trim();
    if (!nom || !uid) return;
    const quantite = parseFloat(document.getElementById('champ-quantite').value) || null;
    const unite = document.getElementById('champ-unite').value;
    const repas = document.getElementById('champ-repas').value;

    await db.collection('users').doc(uid).collection('aliments').add({
      date: cleDate(dateCourante),
      repas, nom, quantite, unite,
      creeLe: firebase.firestore.FieldValue.serverTimestamp()
    });
    champAliment.value = '';
    document.getElementById('champ-quantite').value = '';
    formAliment.classList.remove('visible');
    chargerJour();
  });

  async function supprimer(id){
    await db.collection('users').doc(uid).collection('aliments').doc(id).delete();
    chargerJour();
  }

  /* ---------- navigation de date ---------- */
  document.getElementById('jour-prec').addEventListener('click', () => {
    dateCourante.setDate(dateCourante.getDate() - 1);
    afficherDate(); chargerJour();
  });
  document.getElementById('jour-suiv').addEventListener('click', () => {
    dateCourante.setDate(dateCourante.getDate() + 1);
    afficherDate(); chargerJour();
  });

  document.getElementById('filtre').addEventListener('change', afficherListe);
  document.getElementById('tri').addEventListener('change', afficherListe);

  /* ---------- auth ---------- */
  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    uid = user.uid;
    chargerJour();
  });

  afficherDate();
  afficherListe();
</script>
</body>
</html>
