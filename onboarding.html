<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Bienvenue</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FD8BAB">
<link rel="apple-touch-icon" href="assets/icone-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MiEndo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<script src="assets/preferences.js"></script>
<style>
  :root{
    --noir:#000;--blanc:#FFF;
    --gris-texte:#828282;--gris-bordure:#E6E6E6;
    --rose:#FD8BAB;--rose-pale:rgba(253,139,171,.34);
    --radius:10px;
  }
  /* ---- préférences d'affichage : mode sombre + échelle de police ---- */
  html{ font-size:calc(16px * var(--echelle-police, 1)); }
  .mode-sombre{
    --noir:#F2F0EF;
    --blanc:#1C1B1E;
    --gris-texte:#A8A6AA;
    --gris-bordure:#3A383D;
  }
  .mode-sombre body{ background-color:#121113; }
  .mode-sombre img:not(.logo, .logo-haut, .photo-recette, [src*="icons/"]){ filter:brightness(.9); }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;color:var(--noir);
    min-height:100dvh;
    background:url('assets/bg.jpg') center/cover no-repeat fixed;
    display:flex;align-items:center;justify-content:center;
    padding:24px 20px;
  }
  .carte{
    width:100%;max-width:360px;
    background:rgba(255,255,255,.88);
    border-radius:20px;
    padding:26px 22px;
    box-shadow:0 6px 24px rgba(0,0,0,.08);
  }
  .logo{display:block;width:96px;margin:0 auto 8px;}
  h1{
    font-family:'Katibeh',serif;
    font-size:34px;font-weight:400;
    text-align:center;line-height:.9;
    margin-bottom:4px;padding-top:8px;
  }
  .intro{color:var(--gris-texte);font-size:13px;text-align:center;margin-bottom:20px;}
  h2{font-size:14px;font-weight:600;margin:18px 0 10px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    color:var(--noir);
    border:1px solid var(--gris-bordure);background:var(--blanc);
    border-radius:999px;padding:8px 14px;
    font:inherit;font-size:13px;cursor:pointer;
  }
  .chip.choisi{background:var(--rose-pale);border-color:var(--rose);font-weight:600;}
  input[type=number]{
    width:100%;height:42px;
    border:1px solid var(--gris-bordure);border-radius:var(--radius);
    padding:0 12px;font:inherit;outline:none;background:var(--blanc);
  }
  input[type=number]:focus{border-color:var(--gris-texte);}
  .btn-valider{
    width:100%;height:46px;margin-top:24px;
    background:var(--noir);color:var(--blanc);
    border:none;border-radius:12px;
    font:inherit;font-weight:600;font-size:15px;cursor:pointer;
  }
  .btn-valider:active{opacity:.85;}
  .message{color:#B3261E;font-size:12.5px;text-align:center;height:16px;margin-top:8px;}
</style>
</head>
<body>

<main class="carte">
  <img class="logo" src="assets/logo.png" alt="MiEndo">
  <h1>Bienvenue !</h1>
  <p class="intro">Quelques questions pour adapter ton suivi. Tu pourras tout modifier plus tard dans ton profil.</p>

  <h2>Ton âge</h2>
  <input type="number" id="age" min="13" max="99" placeholder="Ex. 22" inputmode="numeric">

  <h2>Ta contraception</h2>
  <div class="chips" id="contraception">
    <button class="chip" data-v="pilule_continue_sans_regles">Pilule continue (sans règles, 28 j)</button>
    <button class="chip" data-v="pilule_21j">Pilule (avec règles, 21 j)</button>
    <button class="chip" data-v="sterilet_hormonal">Stérilet hormonal</button>
    <button class="chip" data-v="sterilet_cuivre">Stérilet au cuivre</button>
    <button class="chip" data-v="implant">Implant</button>
    <button class="chip" data-v="patch">Patch</button>
    <button class="chip" data-v="anneau">Anneau</button>
    <button class="chip" data-v="aucune">Aucune</button>
    <button class="chip" data-v="autre">Autre</button>
  </div>

  <h2>Tes objectifs <span style="color:var(--gris-texte);font-weight:400;">(plusieurs choix possibles)</span></h2>
  <div class="chips" id="objectifs">
    <button class="chip" data-v="tomber_enceinte">Tomber enceinte</button>
    <button class="chip" data-v="suivre_cycle">Suivre mon cycle</button>
    <button class="chip" data-v="comprendre_douleurs">Comprendre mes douleurs</button>
  </div>

  <label style="display:flex;gap:10px;align-items:flex-start;margin-top:20px;font-size:12.5px;line-height:1.5;cursor:pointer;">
    <input type="checkbox" id="consentement" style="margin-top:2px;accent-color:var(--rose);width:16px;height:16px;flex-shrink:0;">
    <span>J'ai lu et j'accepte la <a href="confidentialite.html" target="_blank" style="color:var(--noir);font-weight:600;">politique de confidentialité</a>, et je comprends que mes données de suivi sont stockées pour mon usage personnel uniquement.</span>
  </label>

  <button class="btn-valider" id="btn-valider">C'est parti !</button>
  <div class="message" id="message"></div>
</main>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let uid = null;
  let contraception = null;
  let objectifs = [];

  document.getElementById('contraception').addEventListener('click', e => {
    const b = e.target.closest('.chip'); if (!b) return;
    document.querySelectorAll('#contraception .chip').forEach(x => x.classList.remove('choisi'));
    b.classList.add('choisi');
    contraception = b.dataset.v;
  });
  document.getElementById('objectifs').addEventListener('click', e => {
    const b = e.target.closest('.chip'); if (!b) return;
    b.classList.toggle('choisi');
    objectifs = [...document.querySelectorAll('#objectifs .chip.choisi')].map(x => x.dataset.v);
  });

  document.getElementById('btn-valider').addEventListener('click', async () => {
    const age = parseInt(document.getElementById('age').value) || null;
    if (!contraception){ document.getElementById('message').textContent = 'Indique ta contraception (ou "Aucune").'; return; }
    if (!objectifs.length){ document.getElementById('message').textContent = 'Choisis au moins un objectif.'; return; }
    if (!document.getElementById('consentement').checked){
      document.getElementById('message').textContent = 'Merci de lire et d\u2019accepter la politique de confidentialit\u00e9.';
      return;
    }

    /* Adaptation du suivi selon la contraception :
       - pilule continue sans règles → pas de prédiction de règles (suiviRegles:false)
       - pilule 21 j → cycle "réglé" à 28 j (21 + 7 d'arrêt)
       - autres → valeurs par défaut, affinées avec les données */
    const adaptation = {
      pilule_continue_sans_regles: { suiviRegles: false, cycleLength: 28 },
      pilule_21j:                  { suiviRegles: true,  cycleLength: 28 },
      sterilet_hormonal:           { suiviRegles: true,  cycleLength: 28 },
      sterilet_cuivre:             { suiviRegles: true,  cycleLength: 28 },
      implant:                     { suiviRegles: false, cycleLength: 28 },
      patch:                       { suiviRegles: true,  cycleLength: 28 },
      anneau:                      { suiviRegles: true,  cycleLength: 28 },
      aucune:                      { suiviRegles: true,  cycleLength: 28 },
      autre:                       { suiviRegles: true,  cycleLength: 28 }
    }[contraception];

    await db.collection('users').doc(uid).set({
      age, contraception, objectifs,
      ...adaptation,
      periodLength: 5,
      onboardingFait: true,
      consentementLe: firebase.firestore.FieldValue.serverTimestamp(),
      creeLe: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    window.location.href = 'guide.html';
  });

  auth.onAuthStateChanged(async user => {
    if (!user || user.isAnonymous) { window.location.href = 'index.html'; return; }
    uid = user.uid;
    // si déjà fait, ne pas re-montrer
    const doc = await db.collection('users').doc(uid).get();
    if (doc.exists && doc.data().onboardingFait) window.location.href = 'cycle.html';
  });
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
