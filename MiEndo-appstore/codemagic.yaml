# codemagic.yaml — recette de build iOS pour MiEndo (Capacitor)
# Le build s'exécute sur un Mac dans le cloud de Codemagic : aucun Mac requis
# de ton côté. Les valeurs marquées « À RENSEIGNER » se configurent une fois
# dans l'interface Codemagic (voir GUIDE-APPSTORE.md).

workflows:

  # ─────────────────────────────────────────────────────────────────────────
  # Workflow de TEST : vérifie que tout compile, SANS compte Apple ni signature.
  # À lancer pendant que le compte Apple Developer est encore en attente.
  # ─────────────────────────────────────────────────────────────────────────
  ios-test-compile:
    name: MiEndo iOS — test de compilation (non signé)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dépendances JS
        script: npm install
      - name: Construire les assets web (www/)
        script: npm run build
      - name: Générer la plateforme iOS
        script: npx cap add ios
      - name: Compiler pour le simulateur (sans signature)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log

  # ─────────────────────────────────────────────────────────────────────────
  # Workflow RÉEL : build signé envoyé sur TestFlight (à utiliser une fois le
  # compte Apple actif + la clé API App Store Connect ajoutée dans Codemagic).
  # ─────────────────────────────────────────────────────────────────────────
  ios-miendo:
    name: MiEndo iOS
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Nom de la clé API App Store Connect que tu auras ajoutée dans
      # Codemagic (Teams > Integrations > App Store Connect). À RENSEIGNER.
      app_store_connect: CodemagicMiEndo

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.miendo        # doit correspondre à l'App ID Apple
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest                          # Codemagic garde "latest" >= Xcode 26
      cocoapods: default

    scripts:
      - name: Installer les dépendances JS
        script: npm install

      - name: Construire les assets web (www/)
        script: npm run build

      - name: Ajouter / synchroniser la plateforme iOS
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            npx cap sync ios
          fi

      - name: Récupérer les profils de signature
        script: xcode-project use-profiles

      - name: Numéro de build unique
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60))

      - name: Compiler l'IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true           # envoie le build sur TestFlight
        # (laisse la soumission App Store finale pour plus tard, manuellement)
