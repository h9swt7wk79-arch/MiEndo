<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Se connecter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FD8BAB">
<link rel="apple-touch-icon" href="assets/icone-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MiEndo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;
    --blanc:#FFFFFF;
    --gris-texte:#828282;
    --gris-bordure:#E6E6E6;
    --gris-clair:#E0E0E0;
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;
    line-height:1.4;
    color:var(--noir);
    background:url('assets/bg.jpg') center/cover no-repeat fixed;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100dvh;
    padding:24px 20px;
  }
  .carte{
    width:100%;
    max-width:320px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .logo{
    width:128px;
    height:auto;
    margin-bottom:28px;
  }
  h1{
    font-size:15px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-bottom:20px;
  }
  .champ{
    width:100%;
    height:44px;
    background:var(--blanc);
    border:1px solid var(--gris-bordure);
    border-radius:var(--radius);
    padding:0 14px;
    font:inherit;
    font-weight:500;
    color:var(--noir);
    margin-bottom:12px;
    outline:none;
  }
  .champ::placeholder{color:var(--gris-texte);font-weight:400;}
  .champ:focus{border-color:var(--gris-texte);}
  .btn{
    width:100%;
    height:44px;
    border:none;
    border-radius:var(--radius);
    font:inherit;
    font-weight:500;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    transition:opacity .15s;
  }
  .btn:active{opacity:.8;}
  .btn:focus-visible{outline:2px solid var(--noir);outline-offset:2px;}
  .btn-noir{
    background:var(--noir);
    color:var(--blanc);
    margin-bottom:4px;
  }
  .btn-blanc{
    background:var(--blanc);
    color:var(--noir);
    border:1px solid var(--gris-bordure);
    margin-bottom:12px;
  }
  .btn-blanc svg{flex-shrink:0;}
  .separateur{
    width:100%;
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--gris-texte);
    margin:18px 0;
    font-size:13px;
  }
  .separateur::before,.separateur::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--gris-clair);
  }
  .legal{
    font-size:12px;
    color:var(--gris-texte);
    text-align:center;
    margin-top:10px;
    max-width:280px;
  }
  .legal a{
    color:var(--noir);
    font-weight:500;
    text-decoration:none;
  }
  .creer{
    display:inline-block;
    margin-top:22px;
    font-size:14px;
    font-weight:700;
    color:var(--noir);
    text-decoration:none;
    background:none;
    border:none;
    font-family:inherit;
    cursor:pointer;
  }
  .message{
    width:100%;
    font-size:13px;
    text-align:center;
    margin-bottom:12px;
    color:#B3261E;
    display:none;
  }
  .message.visible{display:block;}
  .message.ok{color:#1E7B34;}
  .cache{display:none !important;}
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
  }
</style>
</head>
<body>

<main class="carte">
  <img class="logo" src="assets/logo.png" alt="MiEndo">

  <h1 id="titre">Se connecter</h1>

  <p class="message" id="message" role="alert"></p>

  <input class="champ" type="email" id="email" placeholder="email@domain.com"
         autocomplete="email" inputmode="email">

  <!-- Champ mot de passe : masqué tant que l'email n'est pas saisi (flux en 2 étapes) -->
  <input class="champ cache" type="password" id="motdepasse" placeholder="Mot de passe"
         autocomplete="current-password">

  <button class="btn btn-noir" id="btn-continuer">Continue</button>

  <div class="separateur">ou</div>

  <button class="btn btn-blanc" id="btn-google">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.9895 10.1871C19.9895 9.3677 19.9214 8.76977 19.7742 8.14969H10.1992V11.848H15.8195C15.7062 12.7671 15.0943 14.1512 13.7346 15.0813L13.7155 15.2051L16.7429 17.4969L16.9527 17.5174C18.8789 15.7789 19.9895 13.2211 19.9895 10.1871Z" fill="#4285F4"/>
      <path d="M10.1993 19.9314C12.9527 19.9314 15.2643 19.0455 16.9527 17.5175L13.7346 15.0814C12.8734 15.6682 11.7176 16.0779 10.1993 16.0779C7.50242 16.0779 5.21352 14.3395 4.39759 11.9367L4.27799 11.9466L1.13003 14.3273L1.08887 14.4392C2.76588 17.6946 6.2106 19.9314 10.1993 19.9314Z" fill="#34A853"/>
      <path d="M4.39748 11.9367C4.18219 11.3167 4.05759 10.6522 4.05759 9.96574C4.05759 9.27918 4.18219 8.61483 4.38615 7.99475L4.38045 7.86269L1.19304 5.44376L1.08876 5.49223C0.397576 6.84315 0.000976562 8.36017 0.000976562 9.96574C0.000976562 11.5713 0.397576 13.0883 1.08876 14.4392L4.39748 11.9367Z" fill="#FBBC05"/>
      <path d="M10.1993 3.85336C12.1142 3.85336 13.406 4.66168 14.1425 5.33718L17.0207 2.59107C15.253 0.985496 12.9527 0 10.1993 0C6.2106 0 2.76588 2.23672 1.08887 5.49214L4.38626 7.99466C5.21352 5.59183 7.50242 3.85336 10.1993 3.85336Z" fill="#EB4335"/>
    </svg>
    Continue with Google
  </button>

  <p class="legal">En continuant, tu acceptes notre <a href="confidentialite.html">politique de confidentialité</a></p>

  <button class="creer" id="btn-creer">Créer un compte</button>

  <a class="legal" style="margin-top:14px;display:block;" href="partenaire.html">💑 Espace partenaire (connexion par code)</a>
</main>

<!-- ============ FIREBASE (SDK compat, comme ton app actuelle) ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // --- éléments ---
  const champEmail  = document.getElementById('email');
  const champMdp    = document.getElementById('motdepasse');
  const btnContinuer= document.getElementById('btn-continuer');
  const btnGoogle   = document.getElementById('btn-google');
  const btnCreer    = document.getElementById('btn-creer');
  const titre       = document.getElementById('titre');
  const message     = document.getElementById('message');

  let modeInscription = false;

  function afficherMessage(texte, ok = false){
    message.textContent = texte;
    message.classList.add('visible');
    message.classList.toggle('ok', ok);
  }
  function effacerMessage(){
    message.classList.remove('visible','ok');
  }

  // --- Redirection si déjà connecté / après connexion ---
  // IMPORTANT : un seul onAuthStateChanged, déclaré au chargement (pas dans un clic).
  auth.onAuthStateChanged(async (user) => {
    if (!user || user.isAnonymous) return; // les partenaires anonymes ne rentrent pas dans l'app
    // questionnaire d'accueil au premier passage, sinon écran Cycle
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      window.location.href = (doc.exists && doc.data().onboardingFait) ? 'cycle.html' : 'onboarding.html';
    } catch(e) {
      window.location.href = 'onboarding.html';
    }
  });

  // --- Email + mot de passe (flux en 2 étapes comme la maquette) ---
  btnContinuer.addEventListener('click', async () => {
    effacerMessage();
    const email = champEmail.value.trim();
    if (!email) { afficherMessage("Saisis ton adresse email."); return; }

    // Étape 1 : on révèle le champ mot de passe
    if (champMdp.classList.contains('cache')) {
      champMdp.classList.remove('cache');
      champMdp.focus();
      return;
    }

    // Étape 2 : connexion ou création
    const mdp = champMdp.value;
    if (!mdp) { afficherMessage("Saisis ton mot de passe."); return; }

    btnContinuer.disabled = true;
    try {
      if (modeInscription) {
        await auth.createUserWithEmailAndPassword(email, mdp);
      } else {
        await auth.signInWithEmailAndPassword(email, mdp);
      }
      // la redirection est gérée par onAuthStateChanged ci-dessus
    } catch (err) {
      console.error(err);
      const codes = {
        'auth/invalid-credential': "Email ou mot de passe incorrect.",
        'auth/user-not-found': "Aucun compte avec cet email.",
        'auth/wrong-password': "Mot de passe incorrect.",
        'auth/email-already-in-use': "Un compte existe déjà avec cet email.",
        'auth/weak-password': "Mot de passe trop court (6 caractères minimum).",
        'auth/invalid-email': "Adresse email invalide."
      };
      afficherMessage(codes[err.code] || "Une erreur est survenue. Réessaie.");
    } finally {
      btnContinuer.disabled = false;
    }
  });

  // --- Google ---
  btnGoogle.addEventListener('click', async () => {
    effacerMessage();
    try {
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        console.error(err);
        afficherMessage("Connexion Google impossible. Réessaie.");
      }
    }
  });

  // --- Basculer connexion / création de compte ---
  btnCreer.addEventListener('click', () => {
    modeInscription = !modeInscription;
    titre.textContent = modeInscription ? "Créer un compte" : "Se connecter";
    btnCreer.textContent = modeInscription ? "J'ai déjà un compte" : "Créer un compte";
    champMdp.classList.remove('cache');
    champMdp.autocomplete = modeInscription ? 'new-password' : 'current-password';
    effacerMessage();
  });

  // Entrée = continuer
  [champEmail, champMdp].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') btnContinuer.click(); })
  );
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
