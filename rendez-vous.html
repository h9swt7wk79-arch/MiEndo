<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Rendez-vous</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000000;
    --blanc:#FFFFFF;
    --gris-texte:#828282;
    --gris-bordure:#E6E6E6;
    --gris-clair:#E0E0E0;
    --rose-actif:rgba(253,139,171,.9);   /* #FD8BAB 90% — onglet ouvert */
    --rose-inactif:rgba(253,139,171,.34);/* #FD8BAB 34% — onglet fermé */
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;
    color:var(--noir);
    min-height:100dvh;
    padding-bottom:88px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,.78)),
      url('assets/bg.jpg') center/cover no-repeat fixed;
  }
  .logo-haut{display:block;width:54px;margin:14px auto 4px;}
  .entete{
    display:grid;
    grid-template-columns:36px 1fr 36px;
    align-items:center;
    padding:0 16px;
    margin-bottom:14px;
  }
  .retour{
    background:none;border:none;cursor:pointer;
    font-size:22px;line-height:1;color:var(--noir);
    text-align:left;padding:4px;
  }
  .titre-page{
    font-family:'Katibeh',serif;
    font-size:38px;font-weight:400;
    text-align:center;line-height:.9;margin-top:8px;
  }
  .btn-plus{
    background:none;border:none;cursor:pointer;
    font-size:26px;line-height:1;color:var(--noir);
    text-align:right;padding:4px;
  }
  /* ---- onglets ---- */
  .onglets{
    display:flex;
    justify-content:space-around;
    padding:0 28px;
    margin-bottom:22px;
  }
  .onglet{
    border:none;cursor:pointer;
    font:inherit;font-weight:600;font-size:14px;
    padding:8px 22px;
    border-radius:999px;
    background:var(--rose-inactif);
    color:var(--noir);
    transition:background .15s;
  }
  .onglet.actif{
    background:var(--rose-actif);
    color:var(--blanc);
  }
  /* ---- formulaire d'ajout ---- */
  .form-rdv{
    display:none;
    background:var(--blanc);
    border-radius:14px;
    margin:0 16px 18px;
    padding:14px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .form-rdv.visible{display:block;}
  .form-rdv input{
    width:100%;height:40px;
    border:1px solid var(--gris-bordure);
    border-radius:var(--radius);
    padding:0 12px;
    font:inherit;
    margin-bottom:10px;
    outline:none;
    background:var(--blanc);
  }
  .form-rdv input:focus{border-color:var(--gris-texte);}
  .ligne-form{display:flex;gap:10px;}
  .ligne-form input{flex:1;min-width:0;}
  .btn-valider{
    width:100%;height:42px;
    background:var(--noir);color:var(--blanc);
    border:none;border-radius:var(--radius);
    font:inherit;font-weight:500;cursor:pointer;
  }
  .btn-valider:active{opacity:.8;}
  /* ---- liste ---- */
  .liste-rdv{padding:0 16px;}
  .rdv{
    display:flex;align-items:center;gap:14px;
    padding:10px 2px;
    border-bottom:1px solid #F0F0F0;
  }
  .rdv-date{
    background:var(--blanc);
    border-radius:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
    min-width:52px;
    padding:8px 6px;
    text-align:center;
    line-height:1.15;
  }
  .rdv-jour{font-weight:600;font-size:15px;display:block;}
  .rdv-mois{font-size:12px;display:block;}
  .rdv-infos{flex:1;min-width:0;}
  .rdv-titre{font-weight:600;font-size:14px;}
  .rdv-lieu{color:var(--gris-texte);font-size:12.5px;margin-top:1px;}
  .rdv-heure{color:var(--gris-texte);font-size:12.5px;white-space:nowrap;margin-right:6px;}
  .rdv-suppr{
    background:none;border:none;cursor:pointer;
    color:var(--gris-texte);font-size:17px;line-height:1;
    padding:2px 6px;border-radius:6px;
  }
  .rdv-suppr:hover{color:var(--noir);background:var(--rose-inactif);}
  .vide{
    color:#B5B5B5;text-align:center;
    padding:32px 16px;font-size:13px;
  }
  /* ---- navigation ---- */
  .nav-bas{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--blanc);
    border-top:1px solid var(--gris-bordure);
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-bas a{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:40px;border-radius:10px;
  }
  .nav-bas a:focus-visible{outline:2px solid var(--noir);}
  .nav-bas img{width:30px;height:30px;}
</style>
</head>
<body>

<img class="logo-haut" src="assets/logo.png" alt="MiEndo">

<div class="entete">
  <button class="retour" aria-label="Retour" onclick="history.back()">‹</button>
  <h1 class="titre-page">Rendez-vous</h1>
  <button class="btn-plus" id="btn-plus" aria-label="Ajouter un rendez-vous">+</button>
</div>

<div class="onglets">
  <button class="onglet actif" id="onglet-avenir">À venir</button>
  <button class="onglet" id="onglet-passe">Passé</button>
</div>

<div class="form-rdv" id="form-rdv">
  <input type="text" id="rdv-titre" placeholder="Intitulé (ex. Rendez-vous Kiné)">
  <input type="text" id="rdv-lieu" placeholder="Lieu (ex. 69001 Lyon)">
  <div class="ligne-form">
    <input type="date" id="rdv-date">
    <input type="time" id="rdv-heure">
  </div>
  <button class="btn-valider" id="btn-enregistrer">Enregistrer</button>
</div>

<div class="liste-rdv" id="liste-rdv"></div>

<nav class="nav-bas">
  <a href="cycle.html" aria-label="Cycle"><img src="assets/icons/lune.svg" alt=""></a>
  <a href="repas.html" aria-label="Repas"><img src="assets/icons/poids.svg" alt=""></a>
  <a href="rendez-vous.html" aria-current="page" aria-label="Rendez-vous"><img src="assets/icons/calendrier.svg" alt=""></a>
  <a href="analyses.html" aria-label="Analyses"><img src="assets/icons/stats.svg" alt=""></a>
  <a href="#" aria-label="Conseils bien-être"><img src="assets/icons/feuille.svg" alt=""></a>
  <a href="#" aria-label="Profil"><img src="assets/icons/profil.svg" alt=""></a>
</nav>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ==========================================================
     MODÈLE : users/{uid}/rendezvous/{autoId}
       titre : "Rendez-vous Kiné"
       lieu  : "69001 Lyon"
       date  : "2026-07-01"
       heure : "14:30" (optionnel)
     ========================================================== */

  let uid = null;
  let rdvs = [];
  let ongletActif = 'avenir';

  const MOIS = ['Janv.','Févr.','Mars','Avr.','Mai','Juin','Juil.','Août','Sept.','Oct.','Nov.','Déc.'];

  function cleAujourdhui(){
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  async function charger(){
    if (!uid) return;
    const snap = await db.collection('users').doc(uid).collection('rendezvous').get();
    rdvs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    afficher();
  }

  function afficher(){
    const auj = cleAujourdhui();
    let liste = ongletActif === 'avenir'
      ? rdvs.filter(r => r.date >= auj).sort((a,b) => (a.date+a.heure).localeCompare(b.date+b.heure))
      : rdvs.filter(r => r.date < auj).sort((a,b) => (b.date+b.heure).localeCompare(a.date+a.heure));

    const conteneur = document.getElementById('liste-rdv');
    conteneur.innerHTML = '';
    if (!liste.length){
      conteneur.innerHTML = `<div class="vide">${
        ongletActif === 'avenir'
          ? 'Aucun rendez-vous à venir. Appuie sur + pour en ajouter un.'
          : 'Aucun rendez-vous passé.'
      }</div>`;
      return;
    }
    liste.forEach(r => {
      const [an, mois, jour] = r.date.split('-').map(Number);
      const ligne = document.createElement('div');
      ligne.className = 'rdv';
      ligne.innerHTML = `
        <div class="rdv-date">
          <span class="rdv-jour">${jour}</span>
          <span class="rdv-mois">${MOIS[mois-1]}</span>
        </div>
        <div class="rdv-infos">
          <div class="rdv-titre"></div>
          <div class="rdv-lieu"></div>
        </div>
        <span class="rdv-heure">${r.heure || ''}</span>
        <button class="rdv-suppr" aria-label="Supprimer">×</button>`;
      ligne.querySelector('.rdv-titre').textContent = r.titre;
      ligne.querySelector('.rdv-lieu').textContent = r.lieu || '';
      ligne.querySelector('.rdv-suppr').addEventListener('click', async () => {
        await db.collection('users').doc(uid).collection('rendezvous').doc(r.id).delete();
        charger();
      });
      conteneur.appendChild(ligne);
    });
  }

  /* ---------- onglets ---------- */
  function changerOnglet(nom){
    ongletActif = nom;
    document.getElementById('onglet-avenir').classList.toggle('actif', nom === 'avenir');
    document.getElementById('onglet-passe').classList.toggle('actif', nom === 'passe');
    afficher();
  }
  document.getElementById('onglet-avenir').addEventListener('click', () => changerOnglet('avenir'));
  document.getElementById('onglet-passe').addEventListener('click', () => changerOnglet('passe'));

  /* ---------- ajout ---------- */
  document.getElementById('btn-plus').addEventListener('click', () => {
    document.getElementById('form-rdv').classList.toggle('visible');
  });

  document.getElementById('btn-enregistrer').addEventListener('click', async () => {
    const titre = document.getElementById('rdv-titre').value.trim();
    const date = document.getElementById('rdv-date').value;
    if (!titre || !date || !uid) return;
    await db.collection('users').doc(uid).collection('rendezvous').add({
      titre,
      lieu: document.getElementById('rdv-lieu').value.trim(),
      date,
      heure: document.getElementById('rdv-heure').value || '',
      creeLe: firebase.firestore.FieldValue.serverTimestamp()
    });
    ['rdv-titre','rdv-lieu','rdv-date','rdv-heure'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('form-rdv').classList.remove('visible');
    changerOnglet('avenir');
    charger();
  });

  /* ---------- auth ---------- */
  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    uid = user.uid;
    charger();
  });

  afficher();
</script>
</body>
</html>
