<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MiEndo — Bilan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Katibeh&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#000;--blanc:#FFF;
    --gris-texte:#828282;--gris-bordure:#E6E6E6;
    --rose:#FD8BAB;--rose-pale:rgba(253,139,171,.34);
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:14px;color:var(--noir);
    min-height:100dvh;padding-bottom:120px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,.8)),
      url('assets/bg.jpg') center/cover no-repeat fixed;
  }
  .logo-haut{display:block;width:54px;margin:14px auto 4px;}
  .entete{display:grid;grid-template-columns:36px 1fr 36px;align-items:center;padding:0 16px;margin-bottom:8px;}
  .retour{background:none;border:none;cursor:pointer;font-size:22px;line-height:1;text-align:left;padding:4px;}
  .titre-page{font-family:'Katibeh',serif;font-size:38px;font-weight:400;text-align:center;line-height:.9;margin-top:8px;}
  .date-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;}
  .date-nav button{background:none;border:none;cursor:pointer;font-size:17px;color:var(--gris-texte);padding:2px 10px;}
  .date-nav span{font-weight:600;font-size:13px;text-transform:capitalize;}
  .contenu{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
  .groupe-titre{
    font-size:12px;font-weight:700;color:var(--gris-texte);
    text-transform:uppercase;letter-spacing:.06em;
    padding:10px 4px 0;
  }
  .section{
    background:var(--blanc);border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
    overflow:hidden;
  }
  .section-tete{
    color:var(--noir);
    width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:13px 16px;background:none;border:none;cursor:pointer;
    font:inherit;font-size:14px;font-weight:600;text-align:left;
  }
  .section-tete .resume{
    color:var(--gris-texte);font-weight:400;font-size:12px;
    max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .section-tete .chevron{color:var(--gris-texte);transition:transform .15s;}
  .section.ouverte .chevron{transform:rotate(90deg);}
  .section-corps{display:none;padding:2px 16px 14px;}
  .section.ouverte .section-corps{display:block;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    color:var(--noir);
    border:1px solid var(--gris-bordure);background:var(--blanc);
    border-radius:999px;padding:7px 13px;
    font:inherit;font-size:13px;cursor:pointer;
  }
  .chip.choisi{background:var(--rose-pale);border-color:var(--rose);font-weight:600;}
  .chip-emoji{font-size:23px;padding:6px 11px;border-radius:12px;}
  .sous-label{font-size:12.5px;font-weight:600;color:var(--gris-texte);margin:12px 0 7px;}
  .sous-label:first-child{margin-top:4px;}
  input[type=range]{width:100%;accent-color:var(--rose);height:28px;}
  .bornes{display:flex;justify-content:space-between;color:var(--gris-texte);font-size:11px;}
  .valeur-eva{color:var(--rose);font-weight:700;font-size:15px;}
  .champ-autre{
    width:100%;height:38px;margin-top:8px;
    border:1px solid var(--gris-bordure);border-radius:var(--radius);
    padding:0 12px;font:inherit;outline:none;display:none;
  }
  .champ-autre.visible{display:block;}
  textarea{
    width:100%;border:1px solid var(--gris-bordure);border-radius:var(--radius);
    padding:10px 12px;font:inherit;resize:vertical;min-height:70px;outline:none;
  }
  .barre-enregistrer{
    position:fixed;left:0;right:0;bottom:64px;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(255,255,255,.95), rgba(255,255,255,0));
    z-index:9;
  }
  .btn-valider{
    width:100%;height:48px;background:var(--noir);color:var(--blanc);
    border:none;border-radius:12px;font:inherit;font-weight:600;font-size:15px;
    cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.18);
  }
  .btn-valider:active{opacity:.85;}
  .confirmation{text-align:center;color:#1E7B34;font-size:13px;height:16px;padding-top:4px;}
  .nav-bas{
    position:fixed;left:0;right:0;bottom:0;background:var(--blanc);
    border-top:1px solid var(--gris-bordure);
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));z-index:10;
  }
  .nav-bas a{display:flex;align-items:center;justify-content:center;width:44px;height:40px;border-radius:10px;}
  .nav-bas img{width:30px;height:30px;}
</style>
</head>
<body>

<img class="logo-haut" src="assets/logo.png" alt="MiEndo">

<div class="entete">
  <button class="retour" aria-label="Retour" onclick="history.back()">‹</button>
  <h1 class="titre-page">Bilan</h1>
  <span></span>
</div>

<div class="date-nav">
  <button id="jour-prec" aria-label="Jour précédent">‹</button>
  <span id="date-affichee"></span>
  <button id="jour-suiv" aria-label="Jour suivant">›</button>
</div>

<div class="contenu" id="contenu"></div>

<div class="barre-enregistrer">
  <button class="btn-valider" id="btn-enregistrer">Enregistrer mon bilan</button>
  <div class="confirmation" id="confirmation"></div>
</div>

<nav class="nav-bas">
  <a href="cycle.html" aria-label="Cycle"><img src="assets/icons/lune.svg" alt=""></a>
  <a href="repas.html" aria-label="Repas"><img src="assets/icons/poids.svg" alt=""></a>
  <a href="rendez-vous.html" aria-label="Rendez-vous"><img src="assets/icons/calendrier.svg" alt=""></a>
  <a href="analyses.html" aria-label="Analyses"><img src="assets/icons/stats.svg" alt=""></a>
  <a href="bien-etre.html" aria-label="Conseils bien-être"><img src="assets/icons/feuille.svg" alt=""></a>
  <a href="profil.html" aria-label="Profil"><img src="assets/icons/profil.svg" alt=""></a>
</nav>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDunVhY9SnccIn78SU0SWyFDrXDrbSM9dw",
    authDomain: "mimiendo-73245.firebaseapp.com",
    projectId: "mimiendo-73245",
    storageBucket: "mimiendo-73245.firebasestorage.app",
    messagingSenderId: "989010109768",
    appId: "1:989010109768:web:8cf8cf916f04ac5feebf7d",
    measurementId: "G-2ZF2VBZP3G"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ============================================================
     CONFIGURATION DES SECTIONS
     type "single"  : un seul choix possible
     type "multi"   : plusieurs choix
     type "eva"     : curseur
     Tout est enregistré dans users/{uid}/journal/{YYYY-MM-DD}
     ============================================================ */
  const GROUPES = [
    { titre:"Ressenti", sections:[
      { id:"bienetre", nom:"Bien-être", type:"single", emoji:true,
        options:["😁","😒","😭","😠","😞","🥰"] },
      { id:"impact", nom:"Impact sur ta journée", type:"single",
        options:["Journée normale","Journée aménagée","Journée annulée"] },
      { id:"etatEmotionnel", nom:"État émotionnel", type:"multi",
        options:["Sautes d'humeur","Fatigue","Irritabilité","Déprimée","Heureuse","Enjouée","Motivée"] },
    ]},
    { titre:"Cycle", sections:[
      { id:"cycleJour", nom:"Règles", type:"cycle" },
    ]},
    { titre:"Douleurs", sections:[
      { id:"douleurEva", nom:"Intensité de la douleur", type:"eva", min:0, max:10,
        gauche:"Aucune", droite:"Insupportable" },
      { id:"douleurs", nom:"Localisation", type:"multi",
        options:["Crampes abdominales","Douleurs pelviennes","Douleurs dos","Dyspareunie","Sciatique","Douleurs aux seins","Jambes lourdes","Douleurs épaules","Douleurs thorax","Douleurs jambes","Migraines","Impression de courbatures"] },
      { id:"etatGeneral", nom:"État général", type:"multi",
        options:["Fatigue","Fatigue moyenne","Fatigue extrême","Brouillard mental","Trous de mémoire","Vertiges","Malaise vagal","Rétention d'eau","Bouffées de chaleur"] },
    ]},
    { titre:"Corps", sections:[
      { id:"digestion", nom:"Digestion", type:"multi",
        options:["Tout va bien","Endo-belly","Nausée","Vomissements","Pas d'appétit","Remontées acides","Aigreurs d'estomac","Brûlures d'estomac"] },
      { id:"transit", nom:"Transit", type:"multi",
        options:["Normal","Constipation","Diarrhée","Mix","Défécation douloureuse","Hémorroïdes"] },
      { id:"fringales", nom:"Fringales", type:"multi",
        options:["Sucré","Salé","Gras"] },
      { id:"urine", nom:"Urine", type:"multi",
        options:["Envies fréquentes","Brûlure","Fuites urinaires","Douleurs urinaires"] },
      { id:"vulveVagin", nom:"Vulve et vagin", type:"multi",
        options:["Normal","Sécheresse intime","Irritation intime","Démangeaison intime","Douleurs vulvaires"] },
      { id:"peau", nom:"Peau", type:"multi",
        options:["Correcte / belle","Peau sèche","Acné","Peau grasse","Démangeaisons","Rougeurs"] },
      { id:"cheveux", nom:"Cheveux", type:"multi",
        options:["Corrects / beaux","Racines grasses","Perte de cheveux","Cuir chevelu sec","Démangeaisons"] },
    ]},
    { titre:"Sommeil & équilibre", sections:[
      { id:"sommeil", nom:"Sommeil", type:"sommeil" },
      { id:"stress", nom:"Stress", type:"single",
        options:["Faible","Moyen","Élevé"] },
      { id:"libido", nom:"Libido", type:"single",
        options:["Basse","Normale","Élevée"] },
      { id:"rapport", nom:"Rapport", type:"single",
        options:["Oui","Non"] },
    ]},
    { titre:"Prises & soins", sections:[
      { id:"medicaments", nom:"Médicaments pris", type:"multi",
        options:["Anti-douleurs","Anti-inflammatoire","Pilule","Vitamine","Antibiotique","Antidépresseur","Antihistaminique","Décontractant musculaire","Anxiolytique"] },
      { id:"complements", nom:"Vitamines et compléments", type:"multi",
        options:["Multivitamines","Vitamine C","Fer","Vitamine D","Glutamine","Magnésium","Calcium"] },
      { id:"therapies", nom:"Thérapies et praticiens", type:"multi",
        options:["Ostéopathe","Sophrologue","Acupuncture","Kiné","Psychologie","Massage"] },
      { id:"dispositifs", nom:"Dispositifs", type:"multi",
        options:["TENS","Bouillotte","Poche de froid"] },
    ]},
    { titre:"Activités", sections:[
      { id:"sport", nom:"Sport", type:"multi", autre:true,
        options:["Course à pied","Marche","Yoga","Natation","Musculation","Vélo","Volley","Autre"] },
      { id:"fete", nom:"Fête et excès", type:"multi",
        options:["Tabac","Alcool","Soirée","Gueule de bois"] },
      { id:"bonus", nom:"Bonus auto-soins", type:"multi",
        options:["Respiration","Check-up corporel","Étirements pelviens","Méditation","Bain chaud","Infusion","Massage du ventre"] },
    ]},
    { titre:"Notes", sections:[
      { id:"notes", nom:"Notes libres", type:"notes" },
    ]},
  ];

  const FLUX = ["💧","💧💧","🌊"];
  const PERTES = ["Pertes normales","Spotting","Crémeuses","Aqueuses","Odorantes","Sèches","Blanc d'œuf"];
  const QUALITE_SOMMEIL = ["Mauvais","Moyen","Bon"];
  const SYMPT_SOMMEIL = ["Endormissement difficile","Insomnie","Réveils nocturnes","Cauchemars","Rêves intenses","Sommeil agité","Réveil en forme"];

  /* ---------- état ---------- */
  let uid = null;
  // date passée en paramètre (clic sur un jour du calendrier), sinon aujourd'hui
  const parametreDate = new URLSearchParams(window.location.search).get('date');
  let dateCourante = parametreDate ? new Date(parametreDate + 'T00:00:00') : new Date();
  if (isNaN(dateCourante)) dateCourante = new Date();
  let reponses = {}; // état courant du formulaire

  function cleDate(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function afficherDate(){
    const auj = cleDate(new Date()) === cleDate(dateCourante);
    document.getElementById('date-affichee').textContent = auj
      ? "Aujourd'hui"
      : dateCourante.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'long' });
  }

  /* ---------- rendu ---------- */
  function chip(label, groupe, opts = {}){
    const b = document.createElement('button');
    b.className = 'chip' + (opts.emoji ? ' chip-emoji' : '');
    b.textContent = label;
    b.dataset.groupe = groupe;
    b.dataset.valeur = label;
    return b;
  }

  function construire(){
    const conteneur = document.getElementById('contenu');
    GROUPES.forEach(g => {
      const titre = document.createElement('div');
      titre.className = 'groupe-titre';
      titre.textContent = g.titre;
      conteneur.appendChild(titre);

      g.sections.forEach(s => {
        const sec = document.createElement('div');
        sec.className = 'section';
        sec.id = 'section-' + s.id;
        sec.innerHTML = `<button class="section-tete">
            <span>${s.nom}</span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span class="resume" id="resume-${s.id}"></span>
              <span class="chevron">›</span>
            </span>
          </button>
          <div class="section-corps" id="corps-${s.id}"></div>`;
        sec.querySelector('.section-tete').addEventListener('click', () => sec.classList.toggle('ouverte'));
        conteneur.appendChild(sec);
        const corps = sec.querySelector('.section-corps');

        if (s.type === 'single' || s.type === 'multi'){
          const zone = document.createElement('div');
          zone.className = 'chips';
          s.options.forEach(o => zone.appendChild(chip(o, s.id, { emoji: s.emoji })));
          corps.appendChild(zone);
          zone.addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            if (s.type === 'single'){
              const deja = b.classList.contains('choisi');
              zone.querySelectorAll('.chip').forEach(x => x.classList.remove('choisi'));
              if (!deja) b.classList.add('choisi');
              reponses[s.id] = deja ? null : b.dataset.valeur;
            } else {
              b.classList.toggle('choisi');
              reponses[s.id] = [...zone.querySelectorAll('.chip.choisi')].map(x => x.dataset.valeur);
              if (s.autre){
                document.getElementById('autre-' + s.id).classList.toggle('visible',
                  (reponses[s.id] || []).includes('Autre'));
              }
            }
            majResume(s);
          });
          if (s.autre){
            const champ = document.createElement('input');
            champ.type = 'text';
            champ.className = 'champ-autre';
            champ.id = 'autre-' + s.id;
            champ.placeholder = 'Précise…';
            champ.addEventListener('input', () => reponses[s.id + 'Autre'] = champ.value.trim());
            corps.appendChild(champ);
          }
        }

        if (s.type === 'eva'){
          corps.innerHTML = `
            <div style="display:flex;justify-content:flex-end;"><span class="valeur-eva" id="eva-val-${s.id}">0</span></div>
            <input type="range" id="eva-${s.id}" min="${s.min}" max="${s.max}" step="1" value="0">
            <div class="bornes"><span>${s.gauche}</span><span>${s.droite}</span></div>`;
          corps.querySelector('input').addEventListener('input', e => {
            reponses[s.id] = parseInt(e.target.value);
            document.getElementById('eva-val-' + s.id).textContent = e.target.value;
            majResume(s);
          });
        }

        if (s.type === 'cycle'){
          corps.innerHTML = `
            <div class="chips" id="cycle-etat">
              <button class="chip" data-valeur="regles">Règles</button>
              <button class="chip" data-valeur="pas_de_regles">Pas de règles</button>
            </div>
            <div id="zone-flux" hidden>
              <div class="sous-label">Flux</div>
              <div class="chips" id="cycle-flux"></div>
            </div>
            <div id="zone-pertes" hidden>
              <div class="sous-label">Pertes</div>
              <div class="chips" id="cycle-pertes"></div>
            </div>`;
          FLUX.forEach(f => document.getElementById('cycle-flux').appendChild(chip(f, 'flux', { emoji:true })));
          PERTES.forEach(p => document.getElementById('cycle-pertes').appendChild(chip(p, 'pertes')));

          document.getElementById('cycle-etat').addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            document.querySelectorAll('#cycle-etat .chip').forEach(x => x.classList.remove('choisi'));
            b.classList.add('choisi');
            reponses.etatCycle = b.dataset.valeur;
            document.getElementById('zone-flux').hidden = b.dataset.valeur !== 'regles';
            document.getElementById('zone-pertes').hidden = b.dataset.valeur !== 'pas_de_regles';
            majResume(s);
          });
          document.getElementById('cycle-flux').addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            document.querySelectorAll('#cycle-flux .chip').forEach(x => x.classList.remove('choisi'));
            b.classList.add('choisi');
            reponses.flux = b.dataset.valeur;
            majResume(s);
          });
          document.getElementById('cycle-pertes').addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            b.classList.toggle('choisi');
            reponses.pertes = [...document.querySelectorAll('#cycle-pertes .chip.choisi')].map(x => x.dataset.valeur);
            majResume(s);
          });
        }

        if (s.type === 'sommeil'){
          corps.innerHTML = `
            <div class="sous-label">Qualité</div>
            <div class="chips" id="sommeil-qualite"></div>
            <div class="sous-label">Temps de sommeil <span class="valeur-eva" id="sommeil-duree-val">–</span></div>
            <input type="range" id="sommeil-duree" min="0" max="13" step="0.5" value="7">
            <div class="bornes"><span>0 h</span><span>13 h+</span></div>
            <div class="sous-label">Cette nuit</div>
            <div class="chips" id="sommeil-symptomes"></div>`;
          QUALITE_SOMMEIL.forEach(q => document.getElementById('sommeil-qualite').appendChild(chip(q, 'sq')));
          SYMPT_SOMMEIL.forEach(q => document.getElementById('sommeil-symptomes').appendChild(chip(q, 'ss')));

          document.getElementById('sommeil-qualite').addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            document.querySelectorAll('#sommeil-qualite .chip').forEach(x => x.classList.remove('choisi'));
            b.classList.add('choisi');
            reponses.sommeilQualite = b.dataset.valeur;
            majResume(s);
          });
          document.getElementById('sommeil-duree').addEventListener('input', e => {
            reponses.sommeilDuree = parseFloat(e.target.value);
            document.getElementById('sommeil-duree-val').textContent =
              e.target.value >= 13 ? '13 h+' : e.target.value + ' h';
            majResume(s);
          });
          document.getElementById('sommeil-symptomes').addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            b.classList.toggle('choisi');
            reponses.sommeilSymptomes = [...document.querySelectorAll('#sommeil-symptomes .chip.choisi')].map(x => x.dataset.valeur);
            majResume(s);
          });
        }

        if (s.type === 'notes'){
          const ta = document.createElement('textarea');
          ta.id = 'champ-notes';
          ta.placeholder = "Autre chose à noter aujourd'hui ?";
          ta.addEventListener('input', () => reponses.notes = ta.value.trim());
          corps.appendChild(ta);
          sec.classList.add('ouverte');
        }
      });
    });
  }

  function majResume(s){
    const el = document.getElementById('resume-' + s.id);
    if (!el) return;
    let r = reponses[s.id];
    if (s.type === 'cycle'){
      r = reponses.etatCycle === 'regles'
        ? 'Règles ' + (reponses.flux || '')
        : reponses.etatCycle === 'pas_de_regles' ? (reponses.pertes || []).join(', ') : null;
    }
    if (s.type === 'sommeil'){
      r = [reponses.sommeilQualite, reponses.sommeilDuree != null ? reponses.sommeilDuree + ' h' : null]
        .filter(Boolean).join(' · ');
    }
    if (Array.isArray(r)) r = r.length ? r.length + ' sélectionné(s)' : null;
    if (s.type === 'eva' && typeof r === 'number') r = r + '/10';
    el.textContent = r || '';
  }

  /* ---------- chargement / réinitialisation ---------- */
  function toutReinitialiser(){
    reponses = {};
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('choisi'));
    document.querySelectorAll('.resume').forEach(r => r.textContent = '');
    const eva = document.getElementById('eva-douleurEva');
    if (eva){ eva.value = 0; document.getElementById('eva-val-douleurEva').textContent = '0'; }
    const sd = document.getElementById('sommeil-duree');
    if (sd){ sd.value = 7; document.getElementById('sommeil-duree-val').textContent = '–'; }
    document.getElementById('zone-flux').hidden = true;
    document.getElementById('zone-pertes').hidden = true;
    document.getElementById('champ-notes').value = '';
    document.querySelectorAll('.champ-autre').forEach(c => { c.value=''; c.classList.remove('visible'); });
  }

  function cocher(zoneSelecteur, valeurs){
    (Array.isArray(valeurs) ? valeurs : [valeurs]).forEach(v => {
      document.querySelectorAll(zoneSelecteur + ' .chip').forEach(b => {
        if (b.dataset.valeur === v) b.classList.add('choisi');
      });
    });
  }

  async function charger(){
    if (!uid) return;
    toutReinitialiser();
    const doc = await db.collection('users').doc(uid).collection('journal').doc(cleDate(dateCourante)).get();
    if (doc.exists){
      const d = doc.data();
      // restaurer chaque section
      GROUPES.flatMap(g => g.sections).forEach(s => {
        if (s.type === 'single' && d[s.id]){
          reponses[s.id] = d[s.id];
          cocher('#corps-' + s.id, d[s.id]);
        }
        if (s.type === 'multi' && Array.isArray(d[s.id])){
          reponses[s.id] = d[s.id];
          cocher('#corps-' + s.id, d[s.id]);
          if (s.autre && d[s.id + 'Autre']){
            reponses[s.id + 'Autre'] = d[s.id + 'Autre'];
            const champ = document.getElementById('autre-' + s.id);
            champ.value = d[s.id + 'Autre'];
            if (d[s.id].includes('Autre')) champ.classList.add('visible');
          }
        }
        if (s.type === 'eva' && typeof d.douleur === 'number'){
          reponses[s.id] = d.douleur;
          document.getElementById('eva-' + s.id).value = d.douleur;
          document.getElementById('eva-val-' + s.id).textContent = d.douleur;
        }
        majResume(s);
      });
      // cycle
      if (d.etatCycle){
        reponses.etatCycle = d.etatCycle;
        cocher('#cycle-etat', d.etatCycle);
        document.getElementById('zone-flux').hidden = d.etatCycle !== 'regles';
        document.getElementById('zone-pertes').hidden = d.etatCycle !== 'pas_de_regles';
        if (d.flux){ reponses.flux = d.flux; cocher('#cycle-flux', d.flux); }
        if (d.pertes){ reponses.pertes = d.pertes; cocher('#cycle-pertes', d.pertes); }
      }
      // sommeil
      if (d.sommeilQualite){ reponses.sommeilQualite = d.sommeilQualite; cocher('#sommeil-qualite', d.sommeilQualite); }
      if (typeof d.sommeilDuree === 'number'){
        reponses.sommeilDuree = d.sommeilDuree;
        document.getElementById('sommeil-duree').value = d.sommeilDuree;
        document.getElementById('sommeil-duree-val').textContent = d.sommeilDuree >= 13 ? '13 h+' : d.sommeilDuree + ' h';
      }
      if (d.sommeilSymptomes){ reponses.sommeilSymptomes = d.sommeilSymptomes; cocher('#sommeil-symptomes', d.sommeilSymptomes); }
      if (d.notes){ reponses.notes = d.notes; document.getElementById('champ-notes').value = d.notes; }
      GROUPES.flatMap(g => g.sections).forEach(majResume);
    }
  }

  /* ---------- enregistrement ---------- */
  document.getElementById('btn-enregistrer').addEventListener('click', async () => {
    if (!uid) return;
    const donnees = { bilan: true, majLe: firebase.firestore.FieldValue.serverTimestamp() };

    GROUPES.flatMap(g => g.sections).forEach(s => {
      if (s.type === 'single' && reponses[s.id]) donnees[s.id] = reponses[s.id];
      if (s.type === 'multi' && (reponses[s.id] || []).length){
        donnees[s.id] = reponses[s.id];
        if (s.autre && reponses[s.id + 'Autre']) donnees[s.id + 'Autre'] = reponses[s.id + 'Autre'];
      }
    });
    if (typeof reponses.douleurEva === 'number') donnees.douleur = reponses.douleurEva; // compatible Analyses
    if (reponses.etatCycle){
      donnees.etatCycle = reponses.etatCycle;
      donnees.regles = reponses.etatCycle === 'regles';
      if (reponses.flux) donnees.flux = reponses.flux;
      if ((reponses.pertes || []).length) donnees.pertes = reponses.pertes;
    }
    if (reponses.sommeilQualite) donnees.sommeilQualite = reponses.sommeilQualite;
    if (typeof reponses.sommeilDuree === 'number') donnees.sommeilDuree = reponses.sommeilDuree;
    if ((reponses.sommeilSymptomes || []).length) donnees.sommeilSymptomes = reponses.sommeilSymptomes;
    if (reponses.notes) donnees.notes = reponses.notes;

    await db.collection('users').doc(uid).collection('journal').doc(cleDate(dateCourante)).set(donnees, { merge:true });

    // mise à jour de l'espace partenaire si un code existe
    try {
      const docUser = await db.collection('users').doc(uid).get();
      const code = docUser.exists ? docUser.data().codePartenaire : null;
      if (code){
        await db.collection('partage').doc(code).set({
          douleurDuJour: typeof reponses.douleurEva === 'number' ? reponses.douleurEva : null,
          bienetreDuJour: reponses.bienetre || null,
          dateBilan: cleDate(dateCourante),
          majLe: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge:true });
      }
    } catch(e){ console.warn('Partage non mis à jour', e); }

    document.getElementById('confirmation').textContent = 'Bilan enregistré ✓';
    setTimeout(() => document.getElementById('confirmation').textContent = '', 2500);
  });

  /* ---------- navigation de date ---------- */
  document.getElementById('jour-prec').addEventListener('click', () => {
    dateCourante.setDate(dateCourante.getDate() - 1); afficherDate(); charger();
  });
  document.getElementById('jour-suiv').addEventListener('click', () => {
    dateCourante.setDate(dateCourante.getDate() + 1); afficherDate(); charger();
  });

  /* ---------- auth ---------- */
  auth.onAuthStateChanged(user => {
    if (!user || user.isAnonymous) { window.location.href = 'index.html'; return; }
    uid = user.uid;
    charger();
  });

  construire();
  afficherDate();
</script>
</body>
</html>
